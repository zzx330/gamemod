(function installCompatibility(){
  const w=window;
  w.requestAnimationFrame=w.requestAnimationFrame||w.webkitRequestAnimationFrame||function(cb){return setTimeout(function(){cb(Date.now())},16)};
  w.cancelAnimationFrame=w.cancelAnimationFrame||w.webkitCancelAnimationFrame||clearTimeout;
  if(!w.performance)w.performance={now:function(){return Date.now()}};
  else if(!w.performance.now)w.performance.now=function(){return Date.now()};
  if(!String.prototype.padStart){
    String.prototype.padStart=function(len,fill){
      var s=String(this),pad=fill===undefined?' ':String(fill);
      while(s.length<len)s=pad+s;
      return s.slice(-len);
    };
  }
  if(!Array.prototype.includes){
    Array.prototype.includes=function(v){
      for(var i=0;i<this.length;i++)if(this[i]===v)return true;
      return false;
    };
  }
  if(!Array.prototype.findIndex){
    Array.prototype.findIndex=function(fn,thisArg){
      for(var i=0;i<this.length;i++)if(fn.call(thisArg,this[i],i,this))return i;
      return -1;
    };
  }
  if(!Object.assign){
    Object.assign=function(target){
      if(target==null)throw new TypeError('Cannot convert undefined or null to object');
      var to=Object(target);
      for(var i=1;i<arguments.length;i++){
        var src=arguments[i];
        if(src==null)continue;
        for(var key in src)if(Object.prototype.hasOwnProperty.call(src,key))to[key]=src[key];
      }
      return to;
    };
  }
  if(!Object.entries){
    Object.entries=function(obj){
      var out=[];
      for(var key in obj)if(Object.prototype.hasOwnProperty.call(obj,key))out.push([key,obj[key]]);
      return out;
    };
  }
  if(w.CanvasRenderingContext2D&&!CanvasRenderingContext2D.prototype.roundRect){
    CanvasRenderingContext2D.prototype.roundRect=function(x,y,wid,hei,r){
      var rr=Array.isArray(r)?r:[r,r,r,r];
      var tl=Number(rr[0])||0,tr=Number(rr[1])||0,br=Number(rr[2])||0,bl=Number(rr[3])||0;
      var max=Math.min(Math.abs(wid),Math.abs(hei))/2;
      tl=Math.min(tl,max);tr=Math.min(tr,max);br=Math.min(br,max);bl=Math.min(bl,max);
      this.moveTo(x+tl,y);
      this.lineTo(x+wid-tr,y);
      this.quadraticCurveTo(x+wid,y,x+wid,y+tr);
      this.lineTo(x+wid,y+hei-br);
      this.quadraticCurveTo(x+wid,y+hei,x+wid-br,y+hei);
      this.lineTo(x+bl,y+hei);
      this.quadraticCurveTo(x,y+hei,x,y+hei-bl);
      this.lineTo(x,y+tl);
      this.quadraticCurveTo(x,y,x+tl,y);
      return this;
    };
  }
})();

// Wave scaling formulas — later waves need more score so the progress bar advances slower.
function getRogueWaveTarget(wave,diff){
  var w=Math.max(1,wave),n=w-1;
  if(diff==='easy')return Math.round(200+n*145+Math.pow(n,1.48)*42);
  if(diff==='medium')return Math.round(260+n*190+Math.pow(n,1.52)*64);
  return Math.round(320+n*235+Math.pow(n,1.56)*90);
}
function getRogueColorCount(wave,diff){
  // Start 3 colors, add 1 every (3 easy / 3 med / 2 hard) waves, cap at 6
  var base=3, step=diff==='hard'?2:3;
  return Math.min(6,base+Math.floor((wave-1)/step));
}
function getRogueSpawnInterval(wave,diff){
  var base=diff==='easy'?40:diff==='medium'?36:32;
  return Math.max(10,base-wave*(diff==='hard'?2.5:diff==='medium'?2:1.5));
}
function getRogueSpeed(wave,diff){
  var base=diff==='easy'?1.0:diff==='medium'?1.2:1.4;
  return base+wave*(diff==='hard'?0.20:diff==='medium'?0.15:0.10);
}
function getEndlessVirusChance(){
  if(mode!=='endless')return 0.04;
  var n=Math.max(0,rogueWave-1);
  var diffBoost=endlessDifficulty==='hard'?0.025:endlessDifficulty==='medium'?0.012:0;
  var chance=0.04+diffBoost+Math.min(0.16,Math.pow(n,0.82)*0.012);
  var resist=1-0.25*(rogueUpgrades.virus_resist||0);
  return clamp(chance*clamp(resist,0.25,1),0.025,0.22);
}
function getEndlessPowerUpChance(){
  var lucky=(rogueUpgrades.lucky_charm||0)*0.08;
  if(mode!=='endless')return POWERUP_SPAWN_CHANCE+lucky;
  var n=Math.max(0,rogueWave-1);
  var baseInterval=endlessDifficulty==='easy'?40:endlessDifficulty==='medium'?36:32;
  var intervalFactor=clamp(getRogueSpawnInterval(rogueWave,endlessDifficulty)/baseInterval,0.22,1);
  var waveDecay=Math.max(0.38,1-n*0.032);
  return clamp((POWERUP_SPAWN_CHANCE+lucky)*intervalFactor*waveDecay,0.008,0.18);
}

function addScorePoints(points){
  const pts=intScore(points);

    const diffKey='endless_'+endlessDifficulty;

}

// Light procedural BGM for v1.8. It follows the active screen volume and stays under short SFX.
let bgmMaster=null,bgmFilter=null,bgmDelay=null,bgmDelayGain=null,bgmTimer=null,bgmStep=0,bgmNextTime=0;
const BGM_BPM=82;
const BGM_STEP=60/BGM_BPM/2;
const BGM_CHORDS=[
  {root:130.81,pad:[261.63,329.63,392.00,493.88],arp:[523.25,659.25,587.33,493.88]},
  {root:146.83,pad:[293.66,349.23,440.00,523.25],arp:[587.33,523.25,440.00,349.23]},
  {root:174.61,pad:[349.23,440.00,523.25,659.25],arp:[659.25,587.33,523.25,440.00]},
  {root:196.00,pad:[392.00,493.88,587.33,783.99],arp:[783.99,659.25,587.33,493.88]}
];
const BGM_MELODY=[0,null,1,null,2,null,1,null,3,null,2,null,1,null,null,null];
function ensureBgmBus(){
  if(!audioCtx||bgmMaster)return;
  bgmFilter=audioCtx.createBiquadFilter();
  bgmFilter.type='lowpass';
  bgmFilter.frequency.value=5200;
  bgmFilter.Q.value=0.4;
  bgmMaster=audioCtx.createGain();
  bgmMaster.gain.value=0.0001;
  bgmDelay=audioCtx.createDelay(1);
  bgmDelay.delayTime.value=0.28;
  bgmDelayGain=audioCtx.createGain();
  bgmDelayGain.gain.value=0.16;
  bgmFilter.connect(bgmMaster);
  bgmFilter.connect(bgmDelay);
  bgmDelay.connect(bgmDelayGain);
  bgmDelayGain.connect(bgmMaster);
  bgmMaster.connect(audioCtx.destination);
}
function getBgmTarget(){
  if(document.hidden||bgmVolume<=0)return 0.0001;
  let base=0.42;
  if(screen==='paused')base=0.24;
  else if(screen==='levelComplete')base=0.50;
  else if(screen==='playing')base=celebrationPhase===2?0.78:0.66;
  return base*bgmVolume;
}
function startBgm(){
  if(!audioCtx)return;
  ensureBgmBus();
  if(bgmTimer)return;
  bgmNextTime=audioCtx.currentTime+0.04;
  bgmTimer=setInterval(scheduleBgm,80);
  scheduleBgm();
}
function scheduleBgm(){
  if(!audioCtx||!bgmMaster)return;
  const now=audioCtx.currentTime;
  bgmMaster.gain.setTargetAtTime(getBgmTarget(),now,0.45);
  while(bgmNextTime<now+0.2){
    playBgmStep(bgmStep,bgmNextTime);
    bgmStep=(bgmStep+1)%64;
    bgmNextTime+=BGM_STEP;
  }
}
function playBgmStep(step,t){
  const chord=BGM_CHORDS[Math.floor(step/16)%BGM_CHORDS.length];
  const pos=step%16;
  const paused=screen==='paused';
  if(pos===0)playBgmPad(chord,t,BGM_STEP*15.5);
  if(!paused&&pos%8===0)playBgmNote(chord.root,t,BGM_STEP*1.8,0.015,'sine',0.03);
  const mi=BGM_MELODY[pos];
  if(!paused&&mi!==null)playBgmBell(chord.arp[mi],t,screen==='playing'?0.021:0.013);
  if(celebrationPhase===2&&pos%2===0)playBgmBell(chord.arp[(pos/2)%chord.arp.length]*2,t,0.009);
}
function playBgmPad(chord,t,dur){
  for(let i=0;i<chord.pad.length;i++){
    playBgmNote(chord.pad[i]*(i%2?1.002:0.998),t,dur,0.006,'triangle',0.55);
  }
}
function playBgmBell(freq,t,vol){
  playBgmNote(freq,t,0.55,vol,'sine',0.012);
  playBgmNote(freq*2,t,0.22,vol*0.18,'triangle',0.005);
}
function playBgmNote(freq,t,dur,vol,type,attack){
  if(!audioCtx||!bgmFilter)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  attack=attack||0.02;
  o.type=type||'sine';
  o.frequency.setValueAtTime(freq,t);
  g.gain.setValueAtTime(0.0001,t);
  g.gain.linearRampToValueAtTime(vol,t+attack);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g);
  g.connect(bgmFilter);
  o.start(t);
  o.stop(t+dur+0.03);
}
document.addEventListener('visibilitychange',function(){
  if(audioCtx&&bgmMaster)bgmMaster.gain.setTargetAtTime(getBgmTarget(),audioCtx.currentTime,0.2);
});
function updateBgmLevel(){
  if(audioCtx&&bgmMaster)bgmMaster.gain.setTargetAtTime(getBgmTarget(),audioCtx.currentTime,0.15);
}

function getSpeedMult(){
  let m=1;
  if(hasPowerUp('slow')){
    m=0.5;
  }
  if(virusActive&&virusType===3)m*=2; // 速度狂暴
  return m;
}
function getScoreMult(){
  let m=hasPowerUp('double')?2:1;
  if(virusActive&&virusType===2)m*=0.5;
  if(mode==='endless'){
    if(endlessDifficulty==='medium')m*=1.5;
    if(endlessDifficulty==='hard')m*=2;
    m*=rogueScoreMult;
    if(rogueWaveFrenzy&&rogueFrenzyTimer>0)m*=2;
    // double_merge: lv1=1.5x, lv2=2.0x
    var dmLv=rogueUpgrades.double_merge||0;
    if(dmLv>=2)m*=2.0;else if(dmLv>=1)m*=1.5;
    // crit_merge: lv1=10% x3, lv2=15% x3
    var critLv=rogueUpgrades.crit_merge||0;
    if(critLv>0&&Math.random()<(critLv>=2?0.15:0.10))m*=3;
  }
  if(celebrationPhase===2)m*=1/3; // 融合期间积分效率降低到三分之一
  return m;
}
function getVirusFieldMult(){
  if(virusActive&&virusType===1)return 2.0; // 范围失控
  return 1;
}

// ═══════════════════════════════════════════
// POWER-UP SYSTEM
// ═══════════════════════════════════════════
function activatePowerUp(type){
  ensureAudio();
  const def=POWERUP_DEFS[type];
  if(virusActive)return; // 病毒期间无法拾取道具
  activePowerUps[type]=def.dur;
  addFloatText(ringX,ringY-20,def.name,def.color,240); // 4s提示
  sfxPowerUp();
}
function activateVirus(){
  ensureAudio();
  // 清除所有道具效果
  for(const key of POWERUP_KEYS)activePowerUps[key]=0;
  virusActive=true;
  virusType=Math.floor(Math.random()*4);
  virusTimer=VIRUS_DEFS[virusType].dur;
  virusContacts++;
  saveVirusContacts();
  addFloatText(ringX,ringY-20,'病毒:'+VIRUS_DEFS[virusType].name,'#FF3030',240);
  shakeTimer=12;shakeIntensity=5;
  sfxCancel();
}
function updatePowerUps(){
  for(const key of POWERUP_KEYS){
    if(activePowerUps[key]>0)activePowerUps[key]--;
  }
  if(virusActive){
    virusTimer--;
    if(virusTimer<=0){virusActive=false;virusType=-1;}
  }
}

// ═══════════════════════════════════════════
// PARTICLE SPAWNING
// ═══════════════════════════════════════════
function getLevelConfig(){
  if(mode==='challenge'&&levelIndex<LEVELS.length){
    return LEVELS[levelIndex];
  }
  return null;
}
function getActiveColorCount(){
  if(mode==='challenge'){
    const cfg=getLevelConfig();
    return cfg?cfg.colors:6;
  }
  if(mode==='endless')return getRogueColorCount(rogueWave,endlessDifficulty);
  return Math.min(6,3+Math.floor(difficulty/3));
}
function trackTaskAbsorb(color){
  if(mode!=='challenge')return;
  const cfg=getLevelConfig();
  if(!cfg||cfg.taskType!=='eat_color')return;
  if(color===cfg.taskColor)levelTaskProgress++;
}
function trackTaskMerge(){
  if(mode!=='challenge')return;
  const cfg=getLevelConfig();
  if(cfg&&cfg.taskType==='merge')levelTaskProgress++;
}
function spawnOutside(isPowerUp){
  const edge=Math.floor(Math.random()*4);
  let x,y,m=20;
  switch(edge){
    case 0:x=-m;y=Math.random()*H;break;
    case 1:x=W+m;y=Math.random()*H;break;
    case 2:x=Math.random()*W;y=-m;break;
    case 3:x=Math.random()*W;y=H+m;break;
  }
  if(isPowerUp==='virus'){
    const vDef=VIRUS_DEFS[Math.floor(Math.random()*4)];
    return{type:'virus',x:x,y:y,vx:0,vy:0,radius:10,color:-1,wobble:Math.random()*Math.PI*2,trail:[],vDef:vDef};
  }
  if(isPowerUp===true){
    const puType=POWERUP_KEYS[Math.floor(Math.random()*POWERUP_KEYS.length)];
    const def=POWERUP_DEFS[puType];
    return{type:'powerup',puType:puType,x:x,y:y,vx:0,vy:0,radius:8,color:-1,wobble:Math.random()*Math.PI*2,trail:[]};
  }
  const ci=Math.floor(Math.random()*getActiveColorCount());
  let baseSpeed,dirVar,cfg=getLevelConfig();
  if(mode==='challenge'&&cfg){
    baseSpeed=cfg.speed;dirVar=cfg.dirVar;
  }else{
    if(endlessDifficulty==='easy'){baseSpeed=1.2;dirVar=0.8}
    else if(endlessDifficulty==='medium'){baseSpeed=1.2+difficulty*0.18;dirVar=Math.min(3,0.8+difficulty*0.08)}
    else{baseSpeed=1.2+difficulty*0.28;dirVar=Math.min(3.5,0.8+difficulty*0.1)}
  }
  const speed=(baseSpeed+Math.random()*baseSpeed*1.2)*getSpeedMult();
  const towardCenter=Math.max(0,0.55-difficulty*0.06-(mode==='challenge'?0.1:0));
  let angle;
  if(Math.random()<towardCenter){angle=Math.atan2(ringY-y,ringX-x)+(Math.random()-0.5)*dirVar;}
  else{angle=Math.random()*Math.PI*2;}
  return{type:'particle',x:x,y:y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,color:ci,radius:3.5+Math.random()*4,trail:[]};
}
function makeInside(wx,wy,wvx,wvy,ci){
  const lx=wx-ringX,ly=wy-ringY;
  const s=Math.sqrt(wvx*wvx+wvy*wvy)*0.5,a=Math.random()*Math.PI*2;
  return{lx:lx,ly:ly,vx:Math.cos(a)*s*2,vy:Math.sin(a)*s*2,color:ci,radius:3.5+Math.random()*3.5,merges:0,glowTimer:0};
}
function trySpawn(){
  if(outsideParticles.length>=MAX_OUTSIDE)return;
  if(mode==='endless'&&celebrationPhase===2)return; // 融合期间不生成道具/病毒
  spawnTimer++;
  if(spawnTimer>=spawnInterval){
    spawnTimer=0;
    // 病毒流星：稀有生成
    if(!virusActive&&celebrationPhase!==2&&Math.random()<getEndlessVirusChance()){
      const vp=spawnOutside('virus');
      const spd=(2+Math.random()*2);
      const a=Math.atan2(ringY-vp.y,ringX-vp.x)+(Math.random()-0.5)*0.6;
      vp.vx=Math.cos(a)*spd;vp.vy=Math.sin(a)*spd;
      outsideParticles.push(vp);
    }else if(Math.random()<getEndlessPowerUpChance()){
      const pp=spawnOutside(true);
      const spd=(1+Math.random()*2)*getSpeedMult();
      const a=Math.atan2(ringY-pp.y,ringX-pp.x)+(Math.random()-0.5)*1.2;
      pp.vx=Math.cos(a)*spd;pp.vy=Math.sin(a)*spd;
      outsideParticles.push(pp);
    }else{
      outsideParticles.push(spawnOutside(false));
    }
    if(Math.random()<0.25+difficulty*0.03){
      outsideParticles.push(spawnOutside(false));
    }
  }
}

    p.x+=p.vx;p.y+=p.vy;
    if(p.x<-20)p.x=W+20;if(p.x>W+20)p.x=-20;

// ═══════════════════════════════════════════
// PHYSICS - OUTSIDE
// ═══════════════════════════════════════════
function getMostFreqColor(){
  const counts={};
  for(const p of insideParticles){
    counts[p.color]=(counts[p.color]||0)+1;
  }
  let bestC=-1,bestN=0;
  for(const [c,n] of Object.entries(counts)){
    if(n>bestN){bestN=n;bestC=parseInt(c);}
  }
  return bestC;
}

function updateOutside(){
  const magnetOn=hasPowerUp('magnet');
  const fieldMult=magnetOn?1.6:1;
  const vFieldMult=getVirusFieldMult();
  const effFieldMult=fieldMult*vFieldMult;
  const effectiveFieldOuter=mode==='endless'?(RING_RADIUS+FIELD_WIDTH*effFieldMult)*rogueFieldMult:(RING_RADIUS+FIELD_WIDTH*effFieldMult);
  const mostColor=getMostFreqColor();
  let totalActivity=0,activeCount=0;

  for(let i=outsideParticles.length-1;i>=0;i--){
    const p=outsideParticles[i];
    const dx=ringX-p.x,dy=ringY-p.y;
    const dist2=dx*dx+dy*dy;

    // 磁铁：只吸引最多颜色的球
    let shouldAttract=true;
    if(magnetOn&&p.type==='particle'&&p.color!==mostColor)shouldAttract=false;

    if(shouldAttract&&dist2<effectiveFieldOuter*effectiveFieldOuter&&dist2>(RING_RADIUS*0.85)*(RING_RADIUS*0.85)){
      const d=Math.sqrt(dist2);
      const t=(effectiveFieldOuter-d)/(effectiveFieldOuter-RING_RADIUS);
      const force=t*t*0.18*((p.type==='powerup'||p.type==='virus')?1.5:1);
      const nx=dx/d,ny=dy/d;
      // 径向拉力
      p.vx+=nx*force;p.vy+=ny*force;
      // 切向力：螺旋下坠，越靠近黑洞切向越强
      const tangForce=t*t*0.045*((p.type==='powerup'||p.type==='virus')?1.2:1);
      const tx=-ny,ty=nx;
      p.vx+=tx*tangForce;p.vy+=ty*tangForce;
      p.vx*=0.995;p.vy*=0.995;
      // 累计场活跃度
      const spd=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
      totalActivity+=t*spd;activeCount++;
    }

    // 病毒碰撞
    if(p.type==='virus'){
      const d2=Math.sqrt(dist2);
      if(d2<=RING_RADIUS+p.radius){
        activateVirus();
        addCaptureFlash(p.x,p.y);
        vibrateAbsorb(true);
        outsideParticles.splice(i,1);continue;
      }
      p.trail.push({x:p.x,y:p.y,life:12});
      if(p.trail.length>10)p.trail.shift();
    }else if(p.type==='powerup'){
      const d2=Math.sqrt(dist2);
      if(d2<=RING_RADIUS-p.radius*0.3){
        if(!virusActive)activatePowerUp(p.puType);
        addCaptureFlash(p.x,p.y);
        vibrateAbsorb(false);
        outsideParticles.splice(i,1);continue;
      }
      p.trail.push({x:p.x,y:p.y,life:12});
      if(p.trail.length>8)p.trail.shift();
    }else if(Math.sqrt(dist2)<=RING_RADIUS-p.radius*0.4){
      // 护盾：只吸收最多颜色的球
      if(hasPowerUp('shield')){
        if(p.color===mostColor||mostColor<0){
          if(insideParticles.length<(mode==='endless'?getRogueCapacity():MAX_INSIDE)){
            insideParticles.push(makeInside(p.x,p.y,p.vx,p.vy,p.color));
            addAbsorbEffect(p.x,p.y,p.color,p.radius);addCaptureFlash(p.x,p.y);sfxCatch();suctionPulse=1;vibrateAbsorb(false);totalAbsorbed++;trackTaskAbsorb(p.color);
          }
        }
        // 非最多颜色的球：弹开，不掉分
        else{
          const d=Math.sqrt(dist2);
          const nx=dx/d,ny=dy/d;
          p.x=ringX-nx*(RING_RADIUS+5);
          p.y=ringY-ny*(RING_RADIUS+5);
          const spd=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
          p.vx=nx*spd*0.8;p.vy=ny*spd*0.8;
          addCaptureFlash(p.x,p.y);
          continue; // 不删除，弹开
        }
      }else{
        // 病毒反向吸收：只吸收非最多颜色
        if(virusActive&&virusType===0){
          if(p.color!==mostColor||mostColor<0){
            if(insideParticles.length<(mode==='endless'?getRogueCapacity():MAX_INSIDE)){
              insideParticles.push(makeInside(p.x,p.y,p.vx,p.vy,p.color));
              addAbsorbEffect(p.x,p.y,p.color,p.radius);addCaptureFlash(p.x,p.y);sfxCatch();suctionPulse=1;vibrateAbsorb(false);totalAbsorbed++;trackTaskAbsorb(p.color);
            }
          }else{
            const d=Math.sqrt(dist2);
            const nx=dx/d,ny=dy/d;
            p.x=ringX-nx*(RING_RADIUS+5);
            p.y=ringY-ny*(RING_RADIUS+5);
            const spd=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
            p.vx=nx*spd*0.8;p.vy=ny*spd*0.8;
            continue;
          }
        }else{
          if(insideParticles.length<(mode==='endless'?getRogueCapacity():MAX_INSIDE)){
            insideParticles.push(makeInside(p.x,p.y,p.vx,p.vy,p.color));
            addAbsorbEffect(p.x,p.y,p.color,p.radius);addCaptureFlash(p.x,p.y);sfxCatch();suctionPulse=1;vibrateAbsorb(false);totalAbsorbed++;trackTaskAbsorb(p.color);
          }
        }
      }
      outsideParticles.splice(i,1);continue;
    }
    p.x+=p.vx;p.y+=p.vy;
    // Trail for regular particles
    if(p.type==='particle'){
      p.trail.push({x:p.x,y:p.y,life:6});
      if(p.trail.length>5)p.trail.shift();
    }
    // Power-up distinct movement
    if(p.type==='powerup'){
      p.wobble+=0.06;
      switch(p.puType){
        case'magnet':p.x+=Math.sin(p.wobble*1.3)*1.2;p.y+=Math.cos(p.wobble*0.9)*1.2;break;
        case'slow':p.vx*=0.995;p.vy*=0.995;p.y+=Math.sin(p.wobble)*0.7;break;
        case'double':p.x+=Math.sin(p.wobble*2.2)*1.8;p.y+=Math.cos(p.wobble*1.7)*1.0;break;
        case'shield':break;
      }
    }
    // 病毒特殊移动
    if(p.type==='virus'){
      p.wobble+=0.08;
      p.x+=Math.sin(p.wobble*1.5)*1.5;p.y+=Math.cos(p.wobble*1.1)*1.5;
    }
    const maxSpd=(4.5+difficulty*0.6)*getSpeedMult();
    const spd=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
    if(spd>maxSpd){p.vx=(p.vx/spd)*maxSpd;p.vy=(p.vy/spd)*maxSpd;}
    const margin=80;
    if(p.x<-margin||p.x>W+margin||p.y<-margin||p.y>H+margin){outsideParticles.splice(i,1)}
  }
  fieldActivity=activeCount>0?Math.min(1,totalActivity/(activeCount*8)):Math.max(0,fieldActivity-0.02);
}

// ═══════════════════════════════════════════
// PHYSICS - INSIDE
// ═══════════════════════════════════════════
function updateInside(){
  const speedLimit=3+difficulty*0.3;
  for(const p of insideParticles){
    p.lx+=p.vx;p.ly+=p.vy;
    p.vx*=0.998;p.vy*=0.998;
    const spd=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
    if(spd>speedLimit){p.vx=(p.vx/spd)*speedLimit;p.vy=(p.vy/spd)*speedLimit;}
    const d=Math.sqrt(p.lx*p.lx+p.ly*p.ly);
    const maxDist=RING_RADIUS-p.radius;
    if(d>maxDist){
      if(d>0.001){const nx=p.lx/d,ny=p.ly/d;p.lx=nx*maxDist;p.ly=ny*maxDist;const dot=p.vx*nx+p.vy*ny;if(dot>0){p.vx-=2*dot*nx;p.vy-=2*dot*ny}}
    }
    if(p.glowTimer>0)p.glowTimer--;
  }
  // Collisions
  for(let i=0;i<insideParticles.length;i++){
    for(let j=i+1;j<insideParticles.length;j++){
      const a=insideParticles[i],b=insideParticles[j];
      const dx=b.lx-a.lx,dy=b.ly-a.ly,d=Math.sqrt(dx*dx+dy*dy);
      const minDist=a.radius+b.radius;
      if(d<minDist&&d>0.001){
        if(a.color===b.color){
          // Merge
          const newR=Math.sqrt(a.radius*a.radius+b.radius*b.radius)*(1+MERGE_GROWTH);
          const newM=Math.max(a.merges,b.merges)+1;
          let pts=intScore(Math.floor((a.radius+b.radius+newM*3)*2)*getScoreMult());
          a.lx=(a.lx+b.lx)/2;a.ly=(a.ly+b.ly)/2;
          a.vx=(a.vx+b.vx)*0.5;a.vy=(a.vy+b.vy)*0.5;
          a.radius=Math.min(newR,RING_RADIUS*0.75);a.merges=newM;a.glowTimer=10;
          const wx=ringX+a.lx,wy=ringY+a.ly;
          comboTimer=COMBO_TIMEOUT;combo++;if(combo>bestCombo)bestCombo=combo;
          // combo_master: bonus score per combo level
          var cmLv=rogueUpgrades.combo_master||0;
          if(cmLv>0&&mode==='endless')pts=intScore(pts+combo*cmLv*4);
          addFloatText(wx,wy,pts,COLORS[a.color]);addGlow(wx,wy,COLORS[a.color]);
          combo>=3?sfxCombo(Math.min(combo,10)):sfxMerge(combo);
          addScorePoints(pts);totalMerges++;trackTaskMerge();
          if(mode==='endless'){
            rogueWaveScore+=pts;
          }
          // 无尽模式融合进度
          if(mode==='endless'&&celebrationPhase===0)endlessFusionScore+=pts;
          insideParticles.splice(j,1);
        }else if(hasPowerUp('shield')){
          // 护盾：弹开不掉分
          const nx=dx/d,ny=dy/d;
          const overlap=minDist-d;
          a.lx-=nx*overlap*0.5;a.ly-=ny*overlap*0.5;
          b.lx+=nx*overlap*0.5;b.ly+=ny*overlap*0.5;
          const dvx=a.vx-b.vx,dvy=a.vy-b.vy;
          const dvDot=dvx*nx+dvy*ny;
          if(dvDot>0){a.vx-=dvDot*nx;a.vy-=dvDot*ny;b.vx+=dvDot*nx;b.vy+=dvDot*ny}
        }else{
          // Different color: big absorbs small, shrinking by area difference
          const big=a.radius>=b.radius?a:b;
          const small=a.radius>=b.radius?b:a;
          const bigIsA=(a.radius>=b.radius);
          const newR=Math.sqrt(Math.max(0.01,big.radius*big.radius-small.radius*small.radius));
          const wx=ringX+(a.lx+b.lx)/2,wy=ringY+(a.ly+b.ly)/2;
          if(newR<2.5){
            // Both vanish if result too small
            const penalty2=intScore(Math.floor((a.radius+b.radius)*3+a.merges*5+b.merges*5));
            spendScorePoints(penalty2);totalPenalties++;
            addFloatText(wx,wy,'-'+penalty2,'#FF3030',70);
            addCancelBurst(wx,wy,a.color,b.color);
            if(mode==='endless'){
              rogueStability-=12;
              if(rogueStability<0)rogueStability=0;
            }
            insideParticles.splice(j,1);insideParticles.splice(i,1);i--;break;
          }else{
            big.radius=newR;big.glowTimer=8;
            const penalty=intScore(Math.floor(small.radius*5+big.merges*8));
            spendScorePoints(penalty);totalPenalties++;
            if(mode==='endless'){
              rogueStability-=Math.floor(8+big.merges*3);
              if(rogueStability<0)rogueStability=0;
            }
            addFloatText(wx,wy,'-'+penalty,'#FF4040',70);
            addCancelBurst(wx,wy,big.color,small.color);
            // Brief red flash on the surviving planet
            big.glowTimer=12;
            if(bigIsA){insideParticles.splice(j,1)}else{insideParticles.splice(i,1);i--;break}
          }
          sfxCancel();combo=0;comboTimer=0;
        }
      }
    }
  }
  // Soft separation for same color
  for(let i=0;i<insideParticles.length;i++){
    for(let j=i+1;j<insideParticles.length;j++){
      const a=insideParticles[i],b=insideParticles[j];
      if(a.color!==b.color)continue;
      const dx=b.lx-a.lx,dy=b.ly-a.ly,d=Math.sqrt(dx*dx+dy*dy);
      const minDist2=(a.radius+b.radius)*0.95;
      if(d<minDist2&&d>0.001){const overlap=minDist2-d,nx=dx/d,ny=dy/d;a.lx-=nx*overlap*0.5;a.ly-=ny*overlap*0.5;b.lx+=nx*overlap*0.5;b.ly+=ny*overlap*0.5}
    }
  }
}

// ═══════════════════════════════════════════
// EFFECTS
// ═══════════════════════════════════════════
function addFloatText(wx,wy,pts,chex,life){life=life||48;effects.push({type:'float',x:wx,y:wy,text:(typeof pts==='string'?pts:'+'+scoreLabel(pts)),color:chex,life:life,maxLife:life})}
function addGlow(wx,wy,chex){effects.push({type:'glow',x:wx,y:wy,radius:8,maxRadius:42,life:24,maxLife:24,color:chex})}
function addCancelBurst(wx,wy,c1,c2){
  for(let i=0;i<8;i++){const a=Math.PI*2/8*i+Math.random()*0.3,sp=1.5+Math.random()*2.5;effects.push({type:'spark',x:wx,y:wy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,color:i%2===0?COLORS[c1]:COLORS[c2],life:20+Math.random()*16,maxLife:36})}
  // Tutorial-style red flash on wrong-color collision
  effects.push({type:'redFlash',x:wx,y:wy,life:32,maxLife:32});
  // Screen shake matching tutorial
  if(shakeTimer<=0){shakeTimer=8;shakeIntensity=6;}
}
function addCaptureFlash(wx,wy){
  effects.push({type:'ringFlash',x:wx,y:wy,radius:6,life:14,maxLife:14});
  // Tutorial-style ripple on capture
  effects.push({type:'ripple',x:wx,y:wy,radius:12,cr:12,maxR:55,life:26,maxLife:26,color:'rgba(140,190,255,0.4)'});
}
function addAbsorbEffect(wx,wy,colorIdx,radius){
  // Dramatic devouring animation: planet stretches, shrinks, and flashes into the core
  effects.push({
    type:'absorb',x:wx,y:wy,color:colorIdx,radius:radius,
    life:16,maxLife:16,tx:ringX,ty:ringY,sx:wx,sy:wy,sr:radius,
    // Generate spark trail particles
    sparks:(function(){var s=[];for(var k=0;k<6;k++)s.push({ang:Math.random()*Math.PI*2,spd:2+Math.random()*4,off:Math.random()*0.4});return s;})()
  });

function updateEffects(){
  for(let i=effects.length-1;i>=0;i--){
    const e=effects[i];e.life--;
    if(e.life<=0){effects.splice(i,1);continue}
    if(e.type==='float')e.y-=1.2;
    if(e.type==='glow'){const t=1-e.life/e.maxLife;e.radius=e.maxRadius*(0.15+t*0.85)}
    if(e.type==='spark'){e.x+=e.vx;e.y+=e.vy;e.vx*=0.94;e.vy*=0.94}
    if(e.type==='ringFlash')e.radius+=1.5;
    if(e.type==='ripple'){var prog=1-e.life/e.maxLife;e.cr=e.radius+(e.maxR-e.radius)*prog;}
    if(e.type==='absorb'){e.tx=ringX;e.ty=ringY;}
    if(e.type==='achToast')e.y-=0.3;
  }
}

function updateDifficulty(){
  if(mode==='challenge'){

    spawnInterval=cfg.spInt;difficulty=levelIndex;
  }else{

  if(false){ // 无尽模式难度基于选择
    if(endlessDifficulty==='easy'){difficulty=0;spawnInterval=40}

      const elapsed=frame*0.016;
      difficulty=Math.floor(elapsed/18); // 每18秒加速一次

function drawSpace(bright){
  bright=bright||0;

  const bgR=5+bright*8,bgG=8+bright*10,bgB=22+bright*12;
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'rgb('+bgR+','+bgG+','+bgB+')');
  grad.addColorStop(0.5,'rgb('+(bgR+4)+','+(bgG+4)+','+(bgB+8)+')');
  grad.addColorStop(1,'rgb('+(bgR+2)+','+(bgG+6)+','+(bgB+4)+')');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
  // Nebula clouds
  const nebula=[
    {x:W*0.22,y:H*0.18,r:W*0.35,c:'rgba(40,20,80,0.06)'},
    {x:W*0.75,y:H*0.7,r:W*0.4,c:'rgba(20,30,70,0.05)'},
    {x:W*0.55,y:H*0.35,r:W*0.3,c:'rgba(30,15,60,0.04)'},

  }

  for(const s of stars){

      ctx.beginPath();ctx.arc(s.x,s.y,s.r*2.5,0,Math.PI*2);ctx.fill();
    }
  }
}

function drawMagneticField(alphaOverride){
  const alpha=alphaOverride||1;
  const magnetOn=hasPowerUp('magnet');
  const fieldMult=magnetOn?1.6:1;
  const effOuter=RING_RADIUS+FIELD_WIDTH*fieldMult;
  // 体积光层：基于场内活跃度与捕获脉冲的亮度
  const volBright=(fieldActivity*0.18+suctionPulse*0.22)*alpha;
  if(volBright>0.005){
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    const volGrad=ctx.createRadialGradient(ringX,ringY,RING_RADIUS*0.4,ringX,ringY,effOuter*0.95);
    volGrad.addColorStop(0,'rgba(80,120,210,'+(volBright*0.7)+')');
    volGrad.addColorStop(0.3,'rgba(60,100,190,'+(volBright*0.5)+')');
    volGrad.addColorStop(0.6,'rgba(30,60,140,'+(volBright*0.25)+')');
    volGrad.addColorStop(1,'rgba(10,20,60,0)');
    ctx.fillStyle=volGrad;ctx.beginPath();ctx.arc(ringX,ringY,effOuter,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
  // Gravity well spiral arms
  const arms=3;
  const spiralAlpha=0.12+fieldActivity*0.08;
  for(let a=0;a<arms;a++){
    const baseAngle=(Math.PI*2/arms)*a+fieldAngle*0.3;
    ctx.beginPath();
    for(let i=0;i<=60;i++){
      const t=i/60;
      const r=RING_RADIUS+4+t*(effOuter-RING_RADIUS);
      const angle=baseAngle+t*2.5;
      const sx=ringX+Math.cos(angle)*r,sy=ringY+Math.sin(angle)*r;
      i===0?ctx.moveTo(sx,sy):ctx.lineTo(sx,sy);
    }
    ctx.strokeStyle=hexToRgba(magnetOn?'#4FC3F7':'#6040A0',spiralAlpha*alpha*(magnetOn?1.6:1));
    ctx.lineWidth=1.5;ctx.stroke();
  }
  // Subtle concentric rings
  for(let i=3;i>=1;i--){
    const r=RING_RADIUS+(FIELD_WIDTH*fieldMult/3)*i;
    ctx.beginPath();ctx.arc(ringX,ringY,r,0,Math.PI*2);
    ctx.setLineDash([4,16]);ctx.lineDashOffset=fieldAngle*(i%2===0?1:-1);
    ctx.strokeStyle=hexToRgba('#5040A0',0.1*alpha);ctx.lineWidth=1;ctx.stroke();
  }
  ctx.setLineDash([]);
  // 捕获脉冲波：吸入瞬间的冲击波/呼吸光环
  if(suctionPulse>0.01){
    const pwR=RING_RADIUS+suctionPulse*80;
    const pwAlpha=suctionPulse*0.4*alpha;
    ctx.strokeStyle='rgba(140,190,255,'+pwAlpha+')';ctx.lineWidth=2.5*suctionPulse;
    ctx.beginPath();ctx.arc(ringX,ringY,pwR,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle='rgba(180,220,255,'+(pwAlpha*0.5)+')';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(ringX,ringY,pwR*1.2,0,Math.PI*2);ctx.stroke();
  }
  // Faint purple glow
  const glowGrad=ctx.createRadialGradient(ringX,ringY,RING_RADIUS*0.6,ringX,ringY,effOuter);
  glowGrad.addColorStop(0,hexToRgba(magnetOn?'#4FC3F7':'#6040A0',0));
  glowGrad.addColorStop(0.5,hexToRgba(magnetOn?'#4FC3F7':'#6040A0',0.05*alpha*(magnetOn?1.8:1)));
  glowGrad.addColorStop(1,hexToRgba(magnetOn?'#4FC3F7':'#6040A0',0));
  ctx.fillStyle=glowGrad;ctx.beginPath();ctx.arc(ringX,ringY,effOuter,0,Math.PI*2);ctx.fill();
}
function drawMagneticLines(){
  const fieldMult=hasPowerUp('magnet')?1.6:1;
  const effOuter=RING_RADIUS+FIELD_WIDTH*fieldMult;
  const maxLines=Math.min(outsideParticles.length,25);
  for(let i2=0;i2<outsideParticles.length;i2++){
    const p=outsideParticles[i2];
    if(i2>=maxLines)break; // 性能：限制绘制丝线数
    const dx=ringX-p.x,dy=ringY-p.y,d=Math.sqrt(dx*dx+dy*dy);
    if(d>RING_RADIUS&&d<effOuter){
      const t=(effOuter-d)/(effOuter-RING_RADIUS),a2=t*0.5,nx=dx/d,ny=dy/d;
      const sx=ringX-nx*RING_RADIUS,sy=ringY-ny*RING_RADIUS;
      // 弧形丝线：二次贝塞尔曲线，控制点偏移产生弯曲
      const perpX=-ny,perpY=nx;
      const curveOffset=t*28;
      const cpx=(p.x+sx)/2+perpX*curveOffset;
      const cpy=(p.y+sy)/2+perpY*curveOffset;
      ctx.beginPath();ctx.moveTo(p.x,p.y);
      ctx.quadraticCurveTo(cpx,cpy,sx,sy);
      const grad=ctx.createLinearGradient(p.x,p.y,sx,sy);
      grad.addColorStop(0,'rgba(140,100,200,'+(a2*0.5)+')');
      grad.addColorStop(0.5,'rgba(180,150,230,'+(a2*0.8)+')');
      grad.addColorStop(1,'rgba(120,80,190,'+(a2*0.3)+')');
      ctx.strokeStyle=grad;ctx.lineWidth=0.8;
      ctx.setLineDash([3,8]);ctx.lineDashOffset=-frame*2.5;ctx.stroke();ctx.setLineDash([]);
      // 能量点沿曲线流动
      const dotT=((frame*0.04)+i2*0.13)%1;
      const dt1=dotT,dt2=(dotT+0.33)%1,dt3=(dotT+0.66)%1;
      [dt1,dt2,dt3].forEach(function(dtVal){
        const ex=p.x+(cpx-p.x)*2*dtVal*(1-dtVal)+(sx-p.x)*dtVal*dtVal;
        const ey=p.y+(cpy-p.y)*2*dtVal*(1-dtVal)+(sy-p.y)*dtVal*dtVal;
        ctx.fillStyle='rgba(200,170,245,'+(a2*0.6)+')';ctx.beginPath();ctx.arc(ex,ey,1.0+dtVal*0.6,0,Math.PI*2);ctx.fill();
      });
    }
  }
  ctx.setLineDash([]);
}
function drawStar(cx,cy,outerR,innerR,points,color,alpha){
  var a=alpha||1;
  ctx.fillStyle=hexToRgba(color,a);
  ctx.beginPath();
  for(var i=0;i<points*2;i++){
    var rr=i%2===0?outerR:innerR;
    var angle=(i*Math.PI)/points-Math.PI/2;
    var sx=cx+Math.cos(angle)*rr;
    var sy=cy+Math.sin(angle)*rr;
    i===0?ctx.moveTo(sx,sy):ctx.lineTo(sx,sy);
  }
  ctx.closePath();ctx.fill();
}
function drawPlanet(x,y,r,ci){
  const ps=PLANET_STYLES[ci];
  // 3D sphere via radial gradient
  const grad=ctx.createRadialGradient(x-r*0.3,y-r*0.3,r*0.1,x,y,r);
  grad.addColorStop(0,ps.light);grad.addColorStop(0.5,ps.color);grad.addColorStop(1,ps.dark);
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=grad;ctx.fill();
  // Surface features
  ctx.fillStyle=hexToRgba(ps.dark,0.25);
  if(ci===0||ci===5){ // Mars/Jupiter - dark patches
    ctx.beginPath();ctx.arc(x-r*0.25,y+r*0.15,r*0.3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(x+r*0.3,y-r*0.2,r*0.22,0,Math.PI*2);ctx.fill();
  }else if(ci===1||ci===4){ // Neptune/Purple - lighter band
    ctx.fillStyle=hexToRgba(ps.light,0.2);
    ctx.fillRect(x-r,y-r*0.15,r*2,r*0.3);
  }else if(ci===2){ // Earth-like - cloud wisps
    ctx.fillStyle=hexToRgba('#ffffff',0.15);
    ctx.beginPath();ctx.arc(x-r*0.1,y-r*0.3,r*0.4,0,Math.PI*2);ctx.fill();
  }
  // Saturn ring
  if(ps.ring){
    ctx.save();ctx.translate(x,y);ctx.rotate(0.35);
    ctx.beginPath();ctx.ellipse(0,0,r*1.5,r*0.32,0,0,Math.PI*2);
    ctx.strokeStyle=hexToRgba(ps.light,0.55);ctx.lineWidth=2.5;ctx.stroke();
    ctx.beginPath();ctx.ellipse(0,0,r*1.25,r*0.22,0,0,Math.PI*2);
    ctx.strokeStyle=hexToRgba(ps.color,0.35);ctx.lineWidth=1.5;ctx.stroke();
    ctx.restore();
  }
  // Highlight
  ctx.beginPath();ctx.arc(x-r*0.2,y-r*0.2,r*0.25,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.2)';ctx.fill();
  // Atmosphere glow
  ctx.beginPath();ctx.arc(x,y,r+1,0,Math.PI*2);
  ctx.strokeStyle=hexToRgba(ps.color,0.3);ctx.lineWidth=1;ctx.stroke();
}

function drawOutsideParticles(){
  for(const p of outsideParticles){
    if(p.type==='virus'){
      // 病毒流星渲染
      const t=frame*0.06,r=p.radius+Math.sin(t*2.5)*2;
      for(let k=0;k<p.trail.length;k++){

      ctx.fillText('☠',p.x,p.y+1);
      ctx.restore();
    }else if(p.type==='powerup'){
      const def=POWERUP_DEFS[p.puType];
      const col=def.color;
      const t=frame*0.06,pulse=Math.sin(t*2.5)*1.8,r=p.radius+pulse;
      // Comet trail
      for(let k=0;k<p.trail.length;k++){

        ctx.fillStyle=hexToRgba(col,ta);ctx.beginPath();ctx.arc(tr.x,tr.y,r*0.45,0,Math.PI*2);ctx.fill();
      }
      ctx.save();ctx.shadowColor=col;ctx.shadowBlur=14+pulse*2;
      ctx.fillStyle=col;
      switch(p.puType){
        case'magnet':ctx.beginPath();for(let i=0;i<6;i++){const a=Math.PI*2/6*i-p.wobble*0.5,px=p.x+Math.cos(a)*r,py=p.y+Math.sin(a)*r;i===0?ctx.moveTo(px,py):ctx.lineTo(px,py)}ctx.closePath();ctx.fill();break;
        case'slow':ctx.beginPath();for(let i=0;i<4;i++){const a=Math.PI*2/4*i+p.wobble*0.3,px=p.x+Math.cos(a)*r,py=p.y+Math.sin(a)*r;ctx.lineTo(px,py);const m=Math.cos(a)*r*0.4,my=Math.sin(a)*r*0.4;ctx.lineTo(p.x+m,p.y+my)}ctx.closePath();ctx.fill();break;
        case'double':ctx.beginPath();for(let i=0;i<10;i++){const a=Math.PI*2/10*i-p.wobble*0.8,rr=i%2===0?r:r*0.45;const px=p.x+Math.cos(a)*rr,py=p.y+Math.sin(a)*rr;i===0?ctx.moveTo(px,py):ctx.lineTo(px,py)}ctx.closePath();ctx.fill();break;
        case'shield':ctx.beginPath();ctx.moveTo(p.x,p.y-r);ctx.lineTo(p.x+r*0.75,p.y);ctx.lineTo(p.x,p.y+r);ctx.lineTo(p.x-r*0.75,p.y);ctx.closePath();ctx.fill();ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=1.5;ctx.stroke();break;
      }
      ctx.restore();
      ctx.fillStyle='rgba(255,255,255,0.6)';ctx.beginPath();ctx.arc(p.x,p.y,r*0.32,0,Math.PI*2);ctx.fill();
    }else{
      for(var k=0;k<p.trail.length;k++){
        var tr=p.trail[k],ta=k/p.trail.length*0.4;
        if(particleStyle==='star'){
          drawStar(tr.x,tr.y,p.radius*ta,p.radius*ta*0.45,5,COLORS[p.color],ta*0.5);
        }else{
          ctx.fillStyle=hexToRgba(COLORS[p.color],ta*0.5);
          ctx.beginPath();ctx.arc(tr.x,tr.y,p.radius*0.5*ta,0,Math.PI*2);ctx.fill();
        }
      }
      // 粒子拉伸效果：在场内时叠加速度拖影和指向黑洞的光丝
      const dfx=ringX-p.x,dfy=ringY-p.y,df=Math.sqrt(dfx*dfx+dfy*dfy);
      const fieldMult2=hasPowerUp('magnet')?1.6:1;
      const effOuter2=RING_RADIUS+FIELD_WIDTH*fieldMult2;
      if(df>RING_RADIUS&&df<effOuter2){
        const ft=(effOuter2-df)/(effOuter2-RING_RADIUS);
        const stretchAlpha=ft*0.35*(1+suctionPulse*0.8);
        if(stretchAlpha>0.01){
          // 速度拖影：沿运动方向的细光条
          const spd2=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
          if(spd2>0.5){
            const svx=p.vx/spd2,svy=p.vy/spd2;
            const trailLen=p.radius*2*ft*(0.8+suctionPulse*0.6);
            ctx.save();ctx.globalCompositeOperation='lighter';
            const trailGrad=ctx.createLinearGradient(p.x,p.y,p.x-svx*trailLen,p.y-svy*trailLen);
            trailGrad.addColorStop(0,'rgba(200,180,240,'+(stretchAlpha*0.9)+')');
            trailGrad.addColorStop(1,'rgba(140,100,200,0)');
            ctx.strokeStyle=trailGrad;ctx.lineWidth=1.2*ft;
            ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x-svx*trailLen,p.y-svy*trailLen);ctx.stroke();
            ctx.restore();
          }
          // 指向黑洞的细光丝
          const bhNx=dfx/df,bhNy=dfy/df;
          const threadLen=p.radius*1.5*ft;
          ctx.save();ctx.globalCompositeOperation='lighter';
          ctx.strokeStyle='rgba(160,130,220,'+(stretchAlpha*0.5)+')';ctx.lineWidth=0.6*ft;
          ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x+bhNx*threadLen,p.y+bhNy*threadLen);ctx.stroke();
          ctx.restore();
        }
      }
      ctx.save();ctx.shadowColor=COLORS[p.color];ctx.shadowBlur=8;
      if(particleStyle==='star'){
        drawStar(p.x,p.y,p.radius*1.15,p.radius*0.5,5,COLORS[p.color],1);
      }else{
        drawPlanet(p.x,p.y,p.radius,p.color);
      }
      ctx.restore();
    }
  }
}

function drawEffectsLayer(){

      ep=ep*ep*ep; // Cubic ease for accelerating pull

function canBitmapText(text){

}
function bitmapTextWidth(text,scale,spacing){

function drawBitmapText(text,x,y,scale,fill,stroke,opts){

      for(let gy=0;gy<g.length;gy++){

function drawLevelSelect(){
  buttons=[];
  drawSpace(0);
  // Title
  ctx.fillStyle='#e0d8f8';ctx.font='bold 26px '+PIXEL_FONT;ctx.textAlign='center';ctx.fillText('选择关卡',W/2,H*0.08);
  // Progress
  const unlocked=getBestChLevel();
  const totalLevels=LEVELS.length;
  ctx.fillStyle='rgba(180,170,210,0.5)';ctx.font='12px "Segoe UI",system-ui,sans-serif';
  ctx.fillText('已解锁: '+(unlocked+1)+' / '+totalLevels,W/2,H*0.08+24);
  // Back button
  drawBackButton('ls_back',20,18,40,'#B0B0B0');
  // Level grid - 6列x5行 = 30关
  const cols=6,rows=5;
  const cardW=Math.min(58,(W-60)/cols),cardH=cardW*1.2;
  const gridW=cols*cardW+(cols-1)*6,gridH=rows*cardH+(rows-1)*6;
  const startX=(W-gridW)/2,startY=H*0.19;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const lv=r*cols+c;
      if(lv>=totalLevels)continue;
      const cfg=LEVELS[lv];
      const cx=startX+c*(cardW+6),cy=startY+r*(cardH+6);
      const isUnlocked=lv<=unlocked;
      const best=getLevelBest(lv);
      // Card bg
      ctx.save();
      if(isUnlocked){
        ctx.fillStyle='rgba(40,35,70,0.85)';
        ctx.shadowColor='rgba(100,80,180,0.25)';ctx.shadowBlur=8;
      }else{
        ctx.fillStyle='rgba(25,22,40,0.7)';
      }
      const cr2=8;ctx.beginPath();ctx.moveTo(cx+cr2,cy);ctx.lineTo(cx+cardW-cr2,cy);ctx.arcTo(cx+cardW,cy,cx+cardW,cy+cr2,cr2);ctx.lineTo(cx+cardW,cy+cardH-cr2);ctx.arcTo(cx+cardW,cy+cardH,cx+cardW-cr2,cy+cardH,cr2);ctx.lineTo(cx+cr2,cy+cardH);ctx.arcTo(cx,cy+cardH,cx,cy+cardH-cr2,cr2);ctx.lineTo(cx,cy+cr2);ctx.arcTo(cx,cy,cx+cr2,cy,cr2);ctx.closePath();ctx.fill();ctx.restore();
      // Border
      ctx.strokeStyle=isUnlocked?'rgba(140,120,200,0.35)':'rgba(60,50,90,0.25)';ctx.lineWidth=1;ctx.stroke();
      // Level number
      ctx.fillStyle=isUnlocked?'#e0d8f8':'rgba(100,90,130,0.5)';ctx.font='bold 13px "Segoe UI",system-ui,sans-serif';ctx.textAlign='center';
      ctx.fillText((lv+1).toString(),cx+cardW/2,cy+cardH*0.35);
      // Task short desc
      const shortDesc=cfg.taskDesc.length>8?cfg.taskDesc.slice(0,7)+'..':cfg.taskDesc;
      ctx.fillStyle=isUnlocked?'rgba(200,180,220,0.55)':'rgba(80,70,110,0.35)';ctx.font='8px "Segoe UI",system-ui,sans-serif';
      ctx.fillText(shortDesc,cx+cardW/2,cy+cardH*0.55);
      // Best score
      if(best>0){
        ctx.fillStyle='rgba(255,215,80,0.75)';ctx.font='8px "Segoe UI",system-ui,sans-serif';
        ctx.fillText('★'+best,cx+cardW/2,cy+cardH*0.72);
      }else if(isUnlocked){
        ctx.fillStyle='rgba(150,140,180,0.35)';ctx.font='8px "Segoe UI",system-ui,sans-serif';ctx.fillText('新关卡',cx+cardW/2,cy+cardH*0.72);
      }else{
        ctx.fillStyle='rgba(100,90,130,0.3)';ctx.font='12px "Segoe UI",system-ui,sans-serif';ctx.fillText('🔒',cx+cardW/2,cy+cardH*0.72);
      }
      if(isUnlocked)pushButton('ls_lv'+lv,cx,cy,cardW,cardH);
    }
  }
}

function drawPowerUpIndicators(){
  if(virusActive)return; // 病毒期间道具无效，不显示
  const active=[];
  for(const key of POWERUP_KEYS){if(activePowerUps[key]>0)active.push({key:key,def:POWERUP_DEFS[key],left:activePowerUps[key]})}
  if(active.length===0)return;
  const iconR=14,gap=10,startX=W/2-(active.length*(iconR*2+gap)-gap)/2,y=86;
  for(let i=0;i<active.length;i++){
    const a=active[i],cx=startX+i*(iconR*2+gap)+iconR,cy=y+iconR;
    const progress=a.left/a.def.dur;
    // Circle bg
    ctx.beginPath();ctx.arc(cx,cy,iconR,0,Math.PI*2);
    ctx.fillStyle='rgba(30,35,50,0.7)';ctx.fill();
    // Progress ring
    ctx.beginPath();ctx.arc(cx,cy,iconR,-Math.PI/2,-Math.PI/2+Math.PI*2*progress);
    ctx.strokeStyle=a.def.color;ctx.lineWidth=2.5;ctx.stroke();
    // Icon text
    ctx.fillStyle=a.def.color;ctx.font='13px '+PIXEL_FONT;ctx.textAlign='center';ctx.fillText(a.def.icon,cx,cy+4.5);
    // Flashing when low
    if(progress<0.25&&Math.floor(frame/15)%2===0){
      ctx.beginPath();ctx.arc(cx,cy,iconR+3,0,Math.PI*2);
      ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;ctx.stroke();
    }
  }
}

function rollRogueUpgrades(){
  const pool=[];
  for(const up of ROGUELIKE_UPGRADES){
    const currentLv=rogueUpgrades[up.id]||0;
    if(currentLv>=up.maxLv)continue;
    const weight=ROGUE_RARITY_WEIGHTS[up.rarity]||10;
    for(let i=0;i<weight;i++)pool.push(up);
  }
  const chosen=[],usedIds={};
  while(chosen.length<3&&pool.length>0){
    const idx=Math.floor(Math.random()*pool.length);
    const up=pool.splice(idx,1)[0];
    if(!usedIds[up.id]){
      chosen.push(up);usedIds[up.id]=true;
    }
  }
  // Fallback: if not enough unique upgrades, fill from all non-maxed upgrades
  if(chosen.length<3){
    for(const up of ROGUELIKE_UPGRADES){
      const lv=rogueUpgrades[up.id]||0;
      if(!usedIds[up.id]&&lv<up.maxLv&&chosen.length<3){chosen.push(up);usedIds[up.id]=true;}
    }
  }
  rogueUpgradeChoices=chosen;
}
function applyRogueUpgrade(upId){

function spawnTutParticle(type){
  var edge=Math.floor(Math.random()*4),x,y,margin=40;
  if(edge===0){x=-margin;y=Math.random()*H}else if(edge===1){x=W+margin;y=Math.random()*H}else if(edge===2){x=Math.random()*W;y=-margin}else{x=Math.random()*W;y=H+margin}
  var r=type==='same'?4+Math.random()*6:7+Math.random()*7;
  var col=type==='same'?COLORS[tutSameColorIdx]:'#FF4040';
  var glowCol=type==='same'?'rgba(160,120,255,0.4)':'rgba(255,60,60,0.5)';
  var spd=type==='same'?40+Math.random()*60:30+Math.random()*50;
  var angle=Math.atan2(tutBlackHoleY-y,tutBlackHoleX-x)+(Math.random()-0.5)*0.9;
  tutParticles.push({x:x,y:y,radius:r,type:type,color:col,glowColor:glowCol,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,life:1,absorbed:false,burstTimer:0});
}
function spawnTutRipple(x,y,positive){
  tutEffects.push({type:'ripple',x:x,y:y,radius:10,maxRadius:70,life:0,duration:0.45,color:positive?'rgba(160,120,255,0.4)':'rgba(255,50,50,0.5)'});
}

function updateTutEffects(dt){
  for(var i=tutEffects.length-1;i>=0;i--){var e=tutEffects[i];e.life+=dt;if(e.life>=e.duration){tutEffects.splice(i,1);}}
}
function updateTutorial(dt){
  if(tutPhase==='none')return;
  if(!isDragging&&tutPhase!=='intro'){
    tutBlackHoleVX*=0.94;tutBlackHoleVY*=0.94;
    if(Math.abs(tutBlackHoleVX)<0.3)tutBlackHoleVX=0;if(Math.abs(tutBlackHoleVY)<0.3)tutBlackHoleVY=0;
    tutBlackHoleTargetX+=tutBlackHoleVX*dt;tutBlackHoleTargetY+=tutBlackHoleVY*dt;
    tutBlackHoleTargetX=clamp(tutBlackHoleTargetX,60,W-60);tutBlackHoleTargetY=clamp(tutBlackHoleTargetY,60,H-60);
  }
  tutBlackHoleX+=(tutBlackHoleTargetX-tutBlackHoleX)*0.12;tutBlackHoleY+=(tutBlackHoleTargetY-tutBlackHoleY)*0.12;
  if(tutPhase==='intro'){tutIntroTimer+=dt;var t=clamp(tutIntroTimer/0.8,0,1);var c1=1.70158,c3=c1+1;tutBHScale=clamp(1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2),0,1);tutBHAlpha=clamp(t*1.2,0,0.12);return}
  tutBHScale=1;tutBHAlpha=0.12;
  if(tutPhase==='motto'){tutMottoTimer+=dt;if(tutMottoTimer>=3.0){screen='menu';showNameOverlay(false);tutPhase='none';}return}
  if(tutPhase==='dragging'){if(isDragging){tutDragAccum+=dt;if(tutDragAccum>=2.0)tutPhase='playing';}return}
  if(tutPhase==='playing'){
    tutPlayingTimer+=dt;
    if(tutPlayingTimer>=10.0){transitionToTutChoice();return;} // 10秒后强制步进
    var maxSame=14,maxDiff=6,sameCount=0,diffCount=0;
    for(var pi=0;pi<tutParticles.length;pi++){if(tutParticles[pi].type==='same')sameCount++;else diffCount++;}
    if(sameCount<maxSame&&Math.random()<0.025)spawnTutParticle('same');
    if(diffCount<maxDiff&&Math.random()<0.012)spawnTutParticle('diff');
    for(var i=tutParticles.length-1;i>=0;i--){
      var p=tutParticles[i];
      if(p.absorbed){p.life-=dt*4;if(p.life<=0)tutParticles.splice(i,1);continue;}
      if(p.burstTimer>0){p.burstTimer-=dt;if(p.burstTimer<=0)tutParticles.splice(i,1);continue;}
      var dx2=tutBlackHoleX-p.x,dy2=tutBlackHoleY-p.y,dist2=Math.sqrt(dx2*dx2+dy2*dy2);
      if(dist2<250&&dist2>1){var force=(250-dist2)/250*0.03*(p.type==='same'?1:0.67);p.vx+=dx2/dist2*force;p.vy+=dy2/dist2*force;}
      p.x+=p.vx*dt;p.y+=p.vy*dt;
      var m2=60;if(p.x<-m2||p.x>W+m2||p.y<-m2||p.y>H+m2){tutParticles.splice(i,1);continue;}
      var cd=Math.sqrt((p.x-tutBlackHoleX)*(p.x-tutBlackHoleX)+(p.y-tutBlackHoleY)*(p.y-tutBlackHoleY));
      if(cd<60+p.radius){if(p.type==='same')tutOnAbsorbSame(p);else tutOnHitDiff(p);}
    }
    if(tutHitDifferent){tutHitDiffTimer+=dt;if(tutHitDiffTimer>=2.0)transitionToTutChoice();}
    updateTutEffects(dt);
    return;
  }
  if(tutPhase==='choice'){for(var j=tutParticles.length-1;j>=0;j--){tutParticles[j].life-=dt*1.2;if(tutParticles[j].life<=0)tutParticles.splice(j,1);}tutBlackHoleTargetX=W/2;tutBlackHoleTargetY=H/2;updateTutEffects(dt);}
}
function tutOnAbsorbSame(p){p.absorbed=true;p.life=0.25;score=Math.max(0,intScore(score)+1);spawnTutRipple(p.x,p.y,true);spawnTutFloatText(p.x,p.y,'+1','#A0C8FF');}
function tutOnHitDiff(p){p.burstTimer=0.3;tutEffects.push({type:'redFlash',x:p.x,y:p.y,life:0,duration:0.58});tutEffects.push({type:'shake',life:0,duration:0.3,intensity:10});rogueStability=Math.max(1,rogueStability-15);spawnTutFloatText(p.x,p.y,'-15','#FF5050');if(!tutHitDifferent){tutHitDifferent=true;tutHitDiffTimer=0;}tutEffects.push({type:'warnText',life:0,duration:1.4});}
function transitionToTutChoice(){tutPhase='choice';isDragging=false;}
function tutResetAll(){tutPhase='intro';tutDragAccum=0;tutHitDifferent=false;tutHitDiffTimer=0;tutParticles=[];tutEffects=[];tutIntroTimer=0;tutPlayingTimer=0;tutBHScale=0;tutBHAlpha=0;tutBlackHoleX=W/2;tutBlackHoleY=H/2;tutBlackHoleTargetX=W/2;tutBlackHoleTargetY=H/2;tutBlackHoleVX=0;tutBlackHoleVY=0;score=0;rogueStability=100;isDragging=false;}

function getPos(e){

    else if(id==='set_sfx_m'){sfxVolume=clamp(Math.round((sfxVolume-0.05)*100)/100,0,1);saveSettings();}

function setSettingsSliderValue(id,pos,meta){

  const t=clamp((pos.x-meta.trackX)/meta.trackW,0,1);
  const raw=min+t*(max-min);
  const val=clamp(Math.round(raw/step)*step,min,max);
  if(id==='set_bgm_drag'){bgmVolume=Math.round(val*100)/100;updateBgmLevel();}
  if(id==='set_sfx_drag')sfxVolume=Math.round(val*100)/100;

  if(id==='set_bri_drag')starBrightness=val;

    if(pos.x>=b.x&&pos.x<=b.x+b.w&&pos.y>=b.y&&pos.y<=b.y+b.h){
      if(screen==='settings'&&(b.id==='set_den_drag'||b.id==='set_bri_drag'||b.id==='set_bgm_drag'||b.id==='set_sfx_drag')){
        settingsDrag={id:b.id,meta:b.meta};setSettingsSliderValue(b.id,pos,b.meta);
        e.preventDefault();return;
      }
      handleButtonClick(b.id);
      e.preventDefault();return;
    }
  }
  // Tutorial choice buttons
  if(screen==='tutorial'&&tutPhase==='choice'){
    var btnW3=Math.min(180,W*0.5),btnH3=Math.min(54,W*0.14),btnX3=W/2-btnW3/2,reviewY3=H*0.62,startY3=reviewY3+62;
    if(pos.x>=btnX3&&pos.x<=btnX3+btnW3){
      if(pos.y>=reviewY3&&pos.y<=reviewY3+btnH3){tutResetAll();e.preventDefault();return;}
      if(pos.y>=startY3&&pos.y<=startY3+btnH3){tutOnStart();e.preventDefault();return;}
    }
  }
  // Ring drag (during playing or tutorial)
  if(screen!=='playing'&&screen!=='tutorial'){e.preventDefault();return;}
  var ttx=screen==='tutorial'?tutBlackHoleX:ringX;
  var tty=screen==='tutorial'?tutBlackHoleY:ringY;
  const dx=pos.x-ttx,dy=pos.y-tty;
  if(Math.sqrt(dx*dx+dy*dy)<RING_RADIUS+30){
    isDragging=true;dragOX=pos.x-ttx;dragOY=pos.y-tty;

    e.preventDefault();

}

  }
  if(!isDragging||(screen!=='playing'&&screen!=='tutorial'))return;
  e.preventDefault();
  const pos=getPos(e);
  if(screen==='tutorial'){
    tutBlackHoleTargetX=pos.x-dragOX;tutBlackHoleTargetY=pos.y-dragOY;
    tutBlackHoleTargetX=Math.max(60,Math.min(W-60,tutBlackHoleTargetX));
    tutBlackHoleTargetY=Math.max(60,Math.min(H-60,tutBlackHoleTargetY));

  }else{var prx=ringX,pry=ringY;ringX=pos.x-dragOX;ringY=pos.y-dragOY;ringX=Math.max(RING_RADIUS*0.3,Math.min(W-RING_RADIUS*0.3,ringX));ringY=Math.max(RING_RADIUS*0.3,Math.min(H-RING_RADIUS*0.3,ringY));ringVX=(ringX-prx)*60;ringVY=(ringY-pry)*60;}
}

// GAME LOOP

function update(){
  frame++;fieldAngle+=0.015;
  if(W!==window.innerWidth||H!==window.innerHeight){
    const orx=ringX/W,ory=ringY/H;resize();ringX=orx*W;ringY=ory*H;initStars();
  }
  if(shakeTimer>0){shakeTimer--;shakeIntensity*=0.85}
  if(levelIntroTimer>0)levelIntroTimer--;
  if(celebrationTimer>0&&celebrationPhase===0){celebrationTimer--;if(celebrationTimer===0)completeLevel()}
  if(suctionPulse>0){suctionPulse=Math.max(0,suctionPulse-0.025);}

  if(screen==='tutorial'){updateTutorial(1/60);return}
  if(screen==='menu'){updateMenuParticles();return}
  if(screen==='levelSelect'||screen==='difficultySelect'||screen==='achievements'||screen==='skins'||screen==='rankSelect'||screen==='leaderboard'||screen==='globalLeaderboard'||screen==='settings'){return}
  if(screen==='paused'||screen==='levelComplete'){updateEffects();return}

  if(comboTimer>0){comboTimer--;if(comboTimer===0)combo=0}
  if(mode==='endless'&&rogueScreen==='playing'&&rogueStability<=0&&celebrationPhase===0){
    if(!rogueRevived){
      rogueScreen='reviveChoice';rogueStability=0;
    }else{
      rogueScreen='runOver';saveScores();checkAchievements();
      var earned=Math.max(1,Math.floor(score/800));addCoins(earned);
    }
  }
  if(mode==='endless'&&rogueScreen!=='playing'){
    if(rogueScreen==='reviveChoice'){updateEffects();} // 复活弹窗时冻结游戏
    return;
  }
  if(rogueFrenzyTimer>0)rogueFrenzyTimer--;
  if(gameTheme==='cell')updatePhages();
  updateDifficulty();
  // Celebration phases
  if(celebrationPhase===1){
    // Pre-fusion pause (2s) - freeze everything
    celebrationTimer--;
    if(celebrationTimer<=0){
      celebrationPhase=2;celebrationTimer=mode==='challenge'?480:360;
          if(mode==='endless'){rogueWaveFrenzy=true;rogueFrenzyTimer=celebrationTimer;} // 8s/6s frenzy (不包含静止2s)
      const cc=Math.floor(Math.random()*getActiveColorCount());
      for(const p of outsideParticles)p.color=cc;
      for(const p of insideParticles)p.color=cc;
      // 强制屏幕范围内加15个框内颜色最多的球（随机出现在地图上）
      const spawnColor=getMostFreqColor()>=0?getMostFreqColor():cc;
      for(let si=0;si<15;si++){
        const sx=Math.random()*W;
        const sy=Math.random()*H;
        const sa2=Math.atan2(ringY-sy,ringX-sx)+(Math.random()-0.5)*1.2;
        const spd=(1+Math.random()*3)*getSpeedMult();
        outsideParticles.push({type:'particle',x:sx,y:sy,vx:Math.cos(sa2)*spd,vy:Math.sin(sa2)*spd,color:spawnColor,radius:3.5+Math.random()*4,trail:[]});
      }
      sfxLevelUp();shakeTimer=12;shakeIntensity=4;
      if(mode==='endless'){virusActive=false;virusType=-1;virusTimer=0;for(const key of POWERUP_KEYS)activePowerUps[key]=0;}
    }
  }else if(celebrationPhase===2){
    // Same-color frenzy
    celebrationTimer--;
    if(celebrationTimer<=0){
      if(mode==='challenge'){celebrationPhase=0;completeLevel();}
      else{
        celebrationPhase=0;rogueWaveFrenzy=false;rogueFrenzyTimer=0;
        // 检查庆典期间是否有待处理的死亡
        if(rogueStability<=0){
          if(!rogueRevived){rogueScreen='reviveChoice';rogueStability=0;}
          else{rogueScreen='runOver';saveScores();checkAchievements();var earned2=Math.max(1,Math.floor(score/800));addCoins(earned2);}
          return;
        }
        rollRogueUpgrades();
        if(rogueUpgradeChoices.length>0){
          rogueScreen='chooseUpgrade';
        }else{
          addFloatText(ringX,ringY-45,'升级已满，进入下一波','#FFD740',90);
          startRogueWave(rogueWave+1);
          rogueScreen='playing';
        }
      }
    }
  }
  if(celebrationPhase!==1)trySpawn();
  updatePowerUps();
  // Freeze outside movement during pre-fusion pause
  if(celebrationPhase!==1){
    updateOutside();
    updateInside();
  }
  updateEffects();
  // Challenge mode task check
  if(mode==='challenge'&&celebrationPhase===0&&levelTaskConfirmed){
    const cfg=getLevelConfig();
    if(cfg){
      let taskDone=false;
      if(cfg.taskType==='score') taskDone=levelScore>=cfg.target;
      else if(cfg.taskType==='eat_color') taskDone=levelTaskProgress>=cfg.target;
      else if(cfg.taskType==='combo') taskDone=bestCombo>=cfg.target;
      else if(cfg.taskType==='merge') taskDone=levelTaskProgress>=cfg.target;
      if(taskDone){
        celebrationPhase=1;celebrationTimer=120;
        addFloatText(ringX,ringY-30,'融合时间!','#FFD740',120);
        sfxLevelUp();
      }
    }
  }
  // Endless mode fusion check
  if(mode==='endless'&&celebrationPhase===0&&rogueWaveScore>=rogueWaveTarget){
    celebrationPhase=1;celebrationTimer=120;
    // 波次完成回血
    var waveHeal=Math.floor(rogueMaxStability*0.20);
    if(rogueStability<rogueMaxStability){
      rogueStability=Math.min(rogueMaxStability,rogueStability+waveHeal);
      addFloatText(ringX,ringY-60,'+'+waveHeal+' HP','#4FC3F7',70);
    }
    addFloatText(ringX,ringY-30,'融合时间!','#FFD740',120);
    sfxLevelUp();
  }
  // Achievement check every 30 frames
  if(frame%30===0)checkAchievements();
}

function render(){
  ctx.clearRect(0,0,W,H);
  const sx=shakeTimer>0?(Math.random()-0.5)*shakeIntensity*2:0;
  const sy=shakeTimer>0?(Math.random()-0.5)*shakeIntensity*2:0;
  ctx.save();ctx.translate(sx,sy);
  if(themeTransition){
    const tt=clamp((frame-themeTransition.start)/themeTransition.duration,0,1);
    const te=tt<0.5?2*tt*tt:1-Math.pow(-2*tt+2,2)/2;
    ctx.translate(0,themeTransition.dir*(1-te)*H*0.28);
    ctx.globalAlpha=0.72+te*0.28;
  }

  if(screen==='tutorial'){
    drawTutorial();
  }else if(screen==='menu'){
    drawMenu();
  }else if(screen==='difficultySelect'){
    drawDifficultySelect();
  }else if(screen==='levelSelect'){
    drawLevelSelect();
  }else if(screen==='achievements'){
    drawAchievements();
  }else if(screen==='skins'){
    drawSkins();
  }else if(screen==='rankSelect'){
    drawRankSelect();
  }else if(screen==='leaderboard'){
    drawLeaderboard();
  }else if(screen==='globalLeaderboard'){
    drawGlobalLeaderboard();
  }else if(screen==='settings'){
    drawSettings();
  }else{
    drawSpace(1.5);
    drawMagneticField();
    drawMagneticLines();
    drawOutsideParticles();
    drawRing(1);
    drawInsideParticles();
    drawEffectsLayer();
    // Slow vignette
    if(hasPowerUp('slow')){
      const vg=ctx.createRadialGradient(W/2,H/2,W*0.35,W/2,H/2,W*0.75);
      vg.addColorStop(0,'rgba(206,147,216,0)');vg.addColorStop(1,'rgba(206,147,216,0.07)');
      ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
    }
    // Celebration text
    const celFont=gameTheme==='western'?'"Segoe UI",system-ui,sans-serif':PIXEL_FONT;
    if(celebrationPhase===1){
      const ca=Math.min(1,celebrationTimer/30);
      ctx.fillStyle='rgba(255,255,255,'+(ca*0.9)+')';
      ctx.font='bold 26px '+celFont;ctx.textAlign='center';
      ctx.fillText('融合时间！',W/2,H*0.35);
      // Countdown dots
      const dots='.'.repeat(Math.ceil(celebrationTimer/30));
      ctx.fillStyle='rgba(255,215,80,'+(ca*0.7)+')';
      ctx.font='18px '+celFont;
      ctx.fillText(dots,W/2,H*0.35+32);
    }else if(celebrationPhase===2){
      const ca=Math.min(1,celebrationTimer/40);
      ctx.fillStyle='rgba(255,215,80,'+(ca*0.85)+')';
      ctx.font='bold 24px '+celFont;ctx.textAlign='center';
      ctx.fillText('全屏同色融合!',W/2,H*0.38);
    }
    // Low stability warning (matching tutorial style)
    if(mode==='endless'&&rogueStability<30&&rogueStability>0){
      var wa=0.4+Math.sin(frame*0.06)*0.3;
      ctx.fillStyle='rgba(255,255,255,'+(wa*0.85)+')';
      ctx.font='"Segoe UI",system-ui,sans-serif;font-weight:300;font-size:20px';ctx.textAlign='center';
      ctx.fillText('引力失衡。',W/2,H*0.7);
    }
    // Virus red border alert
    if(virusActive){
      const pulse=0.25+Math.sin(frame*0.05)*0.2;
      const bw=8+Math.sin(frame*0.08)*4; // border width pulses
      ctx.save();
      // Top border
      const bGradTop=ctx.createLinearGradient(0,0,0,bw);
      bGradTop.addColorStop(0,'rgba(255,20,20,'+(pulse+0.15)+')');
      bGradTop.addColorStop(1,'rgba(255,20,20,0)');
      ctx.fillStyle=bGradTop;ctx.fillRect(0,0,W,bw);
      // Bottom border
      const bGradBot=ctx.createLinearGradient(0,H-bw,0,H);
      bGradBot.addColorStop(0,'rgba(255,20,20,0)');
      bGradBot.addColorStop(1,'rgba(255,20,20,'+(pulse+0.15)+')');
      ctx.fillStyle=bGradBot;ctx.fillRect(0,H-bw,W,bw);
      // Left border
      const bGradLeft=ctx.createLinearGradient(0,0,bw,0);
      bGradLeft.addColorStop(0,'rgba(255,20,20,'+(pulse+0.15)+')');
      bGradLeft.addColorStop(1,'rgba(255,20,20,0)');
      ctx.fillStyle=bGradLeft;ctx.fillRect(0,0,bw,H);
      // Right border
      const bGradRight=ctx.createLinearGradient(W-bw,0,W,0);
      bGradRight.addColorStop(0,'rgba(255,20,20,0)');
      bGradRight.addColorStop(1,'rgba(255,20,20,'+(pulse+0.15)+')');
      ctx.fillStyle=bGradRight;ctx.fillRect(W-bw,0,bw,H);
      ctx.restore();
    }
    drawGameHUD();
    if(gameTheme==='cell'&&mode==='endless')drawPhages();
    if(screen==='paused')drawPauseOverlay();
    if(screen==='levelComplete')drawLevelComplete();
    // Roguelike overlays (drawn on top of game HUD)
    if(mode==='endless'&&rogueScreen==='reviveChoice')drawRogueRevive();
    if(mode==='endless'&&rogueScreen==='chooseUpgrade')drawRogueUpgradeChoice();
    if(mode==='endless'&&rogueScreen==='runOver'){
	    drawRogueRunOver();
	  }
  }
  ctx.restore();
}

let _lastUpdate=0,_acc=0;
const _FIXED_DT=1000/60;
var _MAX_UPDATES=5;
function loop(ts){
  try{
  if(ts===undefined)ts=performance.now();
  if(!_lastUpdate){_lastUpdate=ts;update();render();requestAnimationFrame(loop);return;}
  var dt=ts-_lastUpdate;
  if(dt<=0){requestAnimationFrame(loop);return;}
  if(dt>1000){_lastUpdate=ts;_acc=0;update();render();requestAnimationFrame(loop);return;}
  _lastUpdate=ts;_acc+=dt;
  var updates=0;
  while(_acc>=_FIXED_DT&&updates<_MAX_UPDATES){update();_acc-=_FIXED_DT;updates++;}
  if(_acc>_FIXED_DT*_MAX_UPDATES)_acc=0;
  render();
  }catch(e){console.warn('loop error:',e);_lastUpdate=0;_acc=0;}
  requestAnimationFrame(loop);
}

const CELL_C={bg:'#0b1810',nucleus:'#1a5c3a',nucleolus:'#0d7a4e',membrane:'#2a7a4a',glow:'#40e080',teal:'#20b8c4',amber:'#f0b429',pink:'#e06090',ink:'#071a0e',white:'#c8f0d8'};

function applyCellPalette(){
  const c=[CELL_C.glow,'#f0b429','#20b8c4','#e06090','#8055cc','#e08840'];
  for(let i=0;i<c.length;i++)COLORS[i]=c[i];
  const st=[
    {color:'#4ecb71',dark:'#2a7a42',light:'#90e8a8',ring:false,name:'葡萄糖'},
    {color:'#f0b429',dark:'#a07820',light:'#f8d870',ring:false,name:'氨基酸'},
    {color:'#20b8c4',dark:'#158090',light:'#80dde8',ring:false,name:'核苷酸'},
    {color:'#e06090',dark:'#904060',light:'#f0a0c0',ring:true,name:'蛋白质'},
    {color:'#8055cc',dark:'#503080',light:'#b090e0',ring:false,name:'脂质'},
    {color:'#e08840',dark:'#985830',light:'#f0b870',ring:false,name:'维生素'}
  ];
  for(let i=0;i<PLANET_STYLES.length;i++)Object.assign(PLANET_STYLES[i],st[i%st.length]);
  if(SKINS&&SKINS.length>0){
    SKINS[0].ringColor='#40e080';SKINS[0].color='#1a5c3a';SKINS[0].name='白细胞';
    SKINS[1].ringColor='#f0b429';SKINS[1].color='#4ecb71';
    SKINS[2].ringColor='#20b8c4';SKINS[2].color='#40a0d0';
    SKINS[3].ringColor='#8055cc';SKINS[3].color='#4ecb71';
  }
}

function drawDotGrid_cell(alpha){}
function drawSpace_cell(bright){
  bright=bright||0;
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,CELL_C.bg);g.addColorStop(0.5,'#0e201a');g.addColorStop(1,'#0a1810');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  for(const s of stars){
    s.twinkle+=s.spd*0.3;
    const a=Math.max(0,(0.04+Math.sin(s.twinkle)*0.02)*starBrightness);
    ctx.fillStyle='rgba(64,224,128,'+a+')';
    ctx.beginPath();ctx.arc(s.x,s.y,s.r*1.1,0,Math.PI*2);ctx.fill();
  }
  ctx.save();
  for(let i=0;i<5;i++){
    const t=frame*0.003+i*1.26;
    const ox=W*(0.1+i*0.2),oy=H*(0.2+i%3*0.25);
    const r=Math.min(W,H)*(0.06+i*0.015)+Math.sin(t)*10;
    ctx.strokeStyle='rgba(40,150,80,'+(0.03+i*0.006)+')';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc((ox+Math.cos(t)*20)%W,oy+Math.sin(t*0.7)*15,r,0,Math.PI*2);ctx.stroke();
  }
  ctx.restore();
}
function drawPlanet_cell(x,y,r,ci){
  const ps=PLANET_STYLES[ci%PLANET_STYLES.length];
  ctx.save();ctx.translate(x,y);
  const type=ci%4;
  if(type===0){
    ctx.beginPath();
    for(let i=0;i<6;i++){const a=i*Math.PI/3+frame*0.01;if(i===0)ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r);else ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}
    ctx.closePath();ctx.fillStyle=ps.color;ctx.fill();
    ctx.strokeStyle=ps.dark;ctx.lineWidth=Math.max(1.5,r*0.12);ctx.stroke();
    ctx.fillStyle=hexToRgba(ps.light,0.7);ctx.beginPath();ctx.arc(0,0,r*0.32,0,Math.PI*2);ctx.fill();
  }else if(type===1){
    ctx.beginPath();
    for(let i=0;i<18;i++){const a=i*Math.PI/9,bump=r*(0.82+0.18*Math.sin(i*3.1+frame*0.02));if(i===0)ctx.moveTo(Math.cos(a)*bump,Math.sin(a)*bump);else ctx.lineTo(Math.cos(a)*bump,Math.sin(a)*bump);}
    ctx.closePath();ctx.fillStyle=ps.color;ctx.fill();
    ctx.strokeStyle=ps.dark;ctx.lineWidth=Math.max(1.5,r*0.12);ctx.stroke();
    ctx.fillStyle=hexToRgba(ps.light,0.6);ctx.beginPath();ctx.ellipse(-r*0.2,-r*0.2,r*0.3,r*0.17,-0.5,0,Math.PI*2);ctx.fill();
  }else if(type===2){
    ctx.rotate(Math.sin(frame*0.04+x*0.02)*0.15);
    ctx.fillStyle=ps.color;ctx.strokeStyle=ps.dark;ctx.lineWidth=Math.max(1.5,r*0.1);
    ctx.beginPath();ctx.ellipse(0,0,r*0.68,r,0,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.fillStyle=hexToRgba(ps.light,0.7);ctx.beginPath();ctx.ellipse(-r*0.15,-r*0.25,r*0.28,r*0.16,-0.3,0,Math.PI*2);ctx.fill();
  }else{
    ctx.fillStyle=ps.color;ctx.strokeStyle=ps.dark;ctx.lineWidth=Math.max(1.5,r*0.1);

    ctx.strokeStyle=hexToRgba(ps.dark,0.45);ctx.lineWidth=Math.max(1,r*0.08);
    for(let i=0;i<3;i++){const a=i*Math.PI*2/3+frame*0.015;ctx.beginPath();ctx.arc(Math.cos(a)*r*0.38,Math.sin(a)*r*0.38,r*0.25,0,Math.PI*2);ctx.stroke();}
    if(ps.ring){ctx.beginPath();ctx.ellipse(0,0,r*1.4,r*0.32,0.3,0,Math.PI*2);ctx.strokeStyle=hexToRgba(ps.color,0.7);ctx.lineWidth=Math.max(2,r*0.1);ctx.stroke();}

}
function drawRing_cell(alphaOverride){
  const alpha=alphaOverride||1;
  ctx.save();ctx.globalAlpha=alpha;
  const skin=SKINS[equippedSkin]||SKINS[0];
  const memColor=skin.ringColor||CELL_C.glow;

  aura.addColorStop(0,'rgba(64,224,128,0.1)');aura.addColorStop(1,'rgba(64,224,128,0)');
  ctx.fillStyle=aura;ctx.beginPath();ctx.arc(ringX,ringY,RING_RADIUS*1.7,0,Math.PI*2);ctx.fill();
  const segs=24,wob=RING_RADIUS*0.06;
  ctx.beginPath();
  for(let i=0;i<segs;i++){
    const a=i*Math.PI*2/segs,w=wob*Math.sin(i*3.7+frame*0.03);
    const rx=ringX+Math.cos(a)*(RING_RADIUS+8+w),ry=ringY+Math.sin(a)*(RING_RADIUS+8+w);
    if(i===0)ctx.moveTo(rx,ry);else ctx.lineTo(rx,ry);
  }
  ctx.closePath();
  ctx.fillStyle='rgba(180,240,200,0.12)';ctx.fill();
  ctx.strokeStyle=memColor;ctx.lineWidth=4;ctx.stroke();
  const cyto=ctx.createRadialGradient(ringX-RING_RADIUS*0.1,ringY-RING_RADIUS*0.1,2,ringX,ringY,RING_RADIUS);
  cyto.addColorStop(0,'rgba(28,72,44,0.88)');cyto.addColorStop(1,'rgba(10,28,16,0.92)');
  ctx.fillStyle=cyto;ctx.beginPath();ctx.arc(ringX,ringY,RING_RADIUS-1,0,Math.PI*2);ctx.fill();
  for(let i=0;i<3;i++){
    const la=i*Math.PI*2/3+frame*0.005;
    const lx=ringX+Math.cos(la)*RING_RADIUS*0.27,ly=ringY+Math.sin(la)*RING_RADIUS*0.27,lr=RING_RADIUS*0.27;
    ctx.fillStyle=CELL_C.nucleus;ctx.beginPath();ctx.arc(lx,ly,lr,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=CELL_C.nucleolus;ctx.beginPath();ctx.arc(lx,ly,lr*0.4,0,Math.PI*2);ctx.fill();
  }
  ctx.fillStyle='rgba(200,255,220,0.18)';ctx.beginPath();ctx.ellipse(ringX-RING_RADIUS*0.24,ringY-RING_RADIUS*0.28,RING_RADIUS*0.28,RING_RADIUS*0.14,-0.4,0,Math.PI*2);ctx.fill();
  if(hasPowerUp('shield')){
    ctx.setLineDash([10,7]);ctx.lineDashOffset=-frame*2;
    ctx.strokeStyle='rgba(64,224,128,0.72)';ctx.lineWidth=4;
    ctx.beginPath();ctx.arc(ringX,ringY,RING_RADIUS+20,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
  }

}
function drawMagneticField_cell(alphaOverride){
  const alpha=alphaOverride||1,magnetOn=hasPowerUp('magnet'),fieldMult=magnetOn?1.6:1,effOuter=RING_RADIUS+FIELD_WIDTH*fieldMult;
  ctx.save();ctx.globalAlpha=alpha;
  // 体积光
  const volBright=(fieldActivity*0.15+suctionPulse*0.2)*alpha;
  if(volBright>0.005){
    ctx.globalCompositeOperation='lighter';
    const vg=ctx.createRadialGradient(ringX,ringY,RING_RADIUS*0.4,ringX,ringY,effOuter*0.95);
    vg.addColorStop(0,magnetOn?'rgba(60,180,240,'+(volBright*0.6)+')':'rgba(40,200,100,'+(volBright*0.6)+')');
    vg.addColorStop(0.5,magnetOn?'rgba(30,120,200,'+(volBright*0.3)+')':'rgba(20,140,60,'+(volBright*0.3)+')');
    vg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=vg;ctx.beginPath();ctx.arc(ringX,ringY,effOuter,0,Math.PI*2);ctx.fill();
    ctx.globalCompositeOperation='source-over';
  }
  ctx.setLineDash([6,12]);ctx.lineDashOffset=-fieldAngle*8;
  for(let i=3;i>=1;i--){
    const r=RING_RADIUS+(FIELD_WIDTH*fieldMult/3)*i;
    ctx.strokeStyle=magnetOn?'rgba(80,200,255,'+(0.1+0.04*i)+')':'rgba(64,224,128,'+(0.1+0.04*i)+')';
    ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(ringX,ringY,r,0,Math.PI*2);ctx.stroke();
  }
  ctx.setLineDash([]);

  if(suctionPulse>0.01){
    ctx.strokeStyle=magnetOn?'rgba(120,230,255,'+(suctionPulse*0.35)+')':'rgba(80,240,140,'+(suctionPulse*0.35)+')';
    ctx.lineWidth=2.5*suctionPulse;ctx.beginPath();ctx.arc(ringX,ringY,RING_RADIUS+suctionPulse*70,0,Math.PI*2);ctx.stroke();

function drawMagneticLines_cell(){
  const fieldMult=hasPowerUp('magnet')?1.6:1,effOuter=RING_RADIUS+FIELD_WIDTH*fieldMult;
  const maxL2=Math.min(outsideParticles.length,25);
  for(let i2=0;i2<outsideParticles.length;i2++){
    const p=outsideParticles[i2];
    if(i2>=maxL2)break;
    const dx=ringX-p.x,dy=ringY-p.y,d=Math.sqrt(dx*dx+dy*dy);
    if(d>RING_RADIUS&&d<effOuter){
      const t=(effOuter-d)/(effOuter-RING_RADIUS),a=t*0.4,nx=dx/d,ny=dy/d;
      const sx=ringX-nx*RING_RADIUS,sy=ringY-ny*RING_RADIUS;
      const cpx=(p.x+sx)/2-ny*t*22,cpy=(p.y+sy)/2+nx*t*22;
      ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.quadraticCurveTo(cpx,cpy,sx,sy);
      ctx.strokeStyle='rgba(64,224,128,'+a+')';ctx.lineWidth=1;ctx.setLineDash([3,8]);ctx.lineDashOffset=-frame*2;ctx.stroke();ctx.setLineDash([]);
      const dotT=((frame*0.04)+i2*0.13)%1;
      const ex=p.x+(cpx-p.x)*2*dotT*(1-dotT)+(sx-p.x)*dotT*dotT;
      const ey=p.y+(cpy-p.y)*2*dotT*(1-dotT)+(sy-p.y)*dotT*dotT;
      ctx.fillStyle='rgba(100,240,160,'+(a*0.6)+')';ctx.beginPath();ctx.arc(ex,ey,1.0,0,Math.PI*2);ctx.fill();
    }
  }
  ctx.setLineDash([]);
}
function drawOutsideParticles_cell(){
  for(const p of outsideParticles){
    if(p.type==='virus'){
      const r=p.radius+Math.sin(frame*0.15)*1.5;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(Math.sin(frame*0.03+p.x*0.01)*0.35);
      ctx.fillStyle='#cc4444';ctx.strokeStyle='#882222';ctx.lineWidth=2;
      ctx.beginPath();ctx.ellipse(0,0,r*0.6,r,0,0,Math.PI*2);ctx.fill();ctx.stroke();
      ctx.strokeStyle='rgba(200,60,60,0.55)';ctx.lineWidth=1.5;ctx.setLineDash([3,4]);
      for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo((i-1)*r*0.4,r);ctx.quadraticCurveTo((i-1)*r*0.4+r*0.25,r*1.4+i*3,(i-1)*r*0.4,r*1.9+i*5);ctx.stroke();}
      ctx.setLineDash([]);ctx.restore();
    }else if(p.type==='powerup'){
      const def=POWERUP_DEFS[p.puType],r=p.radius+Math.sin(frame*0.16)*1.3;
      ctx.save();ctx.shadowColor=def.color;ctx.shadowBlur=14;
      ctx.fillStyle='rgba(10,40,20,0.85)';ctx.strokeStyle=def.color;ctx.lineWidth=3;
      ctx.beginPath();ctx.arc(p.x,p.y,r+4,0,Math.PI*2);ctx.fill();ctx.stroke();
      ctx.fillStyle=def.color;ctx.font='bold '+Math.max(12,r*1.1)+'px "Segoe UI",system-ui,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(def.icon,p.x,p.y);ctx.textBaseline='alphabetic';
      ctx.restore();
    }else{
      // 粒子拉伸效果
      const dfx=ringX-p.x,dfy=ringY-p.y,df=Math.sqrt(dfx*dfx+dfy*dfy);
      const fm2=hasPowerUp('magnet')?1.6:1;
      const eo2=RING_RADIUS+FIELD_WIDTH*fm2;
      if(df>RING_RADIUS&&df<eo2){
        const ft=(eo2-df)/(eo2-RING_RADIUS),sa=ft*0.3*(1+suctionPulse*0.7);
        if(sa>0.01){
          const spd=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
          if(spd>0.5){ctx.save();ctx.globalCompositeOperation='lighter';ctx.strokeStyle='rgba(100,220,160,'+sa+')';ctx.lineWidth=1*ft;ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x-p.vx/spd*p.radius*1.8*ft,p.y-p.vy/spd*p.radius*1.8*ft);ctx.stroke();ctx.restore();}
          const nx=dfx/df,ny=dfy/df;ctx.save();ctx.globalCompositeOperation='lighter';ctx.strokeStyle='rgba(80,180,140,'+(sa*0.4)+')';ctx.lineWidth=0.5*ft;ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x+nx*p.radius*1.2*ft,p.y+ny*p.radius*1.2*ft);ctx.stroke();ctx.restore();
        }
      }
      drawPlanet_cell(p.x,p.y,p.radius,p.color);
    }
  }
}

// ── Bacteriophage mechanic ──────────────────
function updatePhages(){
  if(gameTheme!=='cell'||mode!=='endless'||screen!=='playing'||rogueScreen!=='playing')return;
  if(score<PHAGE_TRIGGER_SCORE)return;
  let attempts=0;
  while(smallCells.length<SMALL_CELL_MAX&&attempts<20){
    attempts++;
    const x=SMALL_CELL_R*2+Math.random()*(W-SMALL_CELL_R*4);
    const y=SMALL_CELL_R*2+Math.random()*(H-SMALL_CELL_R*4);
    const dx=x-ringX,dy=y-ringY;
    if(Math.sqrt(dx*dx+dy*dy)>RING_RADIUS*3.5)
      smallCells.push({x,y,infected:false,infTimer:0,maxInfTimer:INF_TIMER,phageIdx:-1,wobble:Math.random()*Math.PI*2});
  }
  phageSpawnTimer--;
  if(phageSpawnTimer<=0&&phages.length<4){
    const side=Math.floor(Math.random()*4);
    let px,py,pvx=0,pvy=0;const spd=1+Math.random()*0.5;
    if(side===0){px=Math.random()*W;py=-PHAGE_RADIUS*2;pvy=spd;}
    else if(side===1){px=W+PHAGE_RADIUS*2;py=Math.random()*H;pvx=-spd;}
    else if(side===2){px=Math.random()*W;py=H+PHAGE_RADIUS*2;pvy=-spd;}
    else{px=-PHAGE_RADIUS*2;py=Math.random()*H;pvx=spd;}
    phages.push({x:px,y:py,vx:pvx,vy:pvy,targetIdx:-1,angle:Math.random()*Math.PI*2});
    phageSpawnTimer=PHAGE_SPAWN_INTERVAL;
  }
  const _usedTargets=new Set();
  for(let i=phages.length-1;i>=0;i--){
    const ph=phages[i];ph.angle+=0.025;
    let nearDist=Infinity,nearIdx=-1;
    for(let j=0;j<smallCells.length;j++){
      if(_usedTargets.has(j))continue;
      if(smallCells[j].phageIdx>=0&&smallCells[j].phageIdx!==i)continue;
      const dx=smallCells[j].x-ph.x,dy=smallCells[j].y-ph.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<nearDist){nearDist=d;nearIdx=j;}
    }
    if(nearIdx<0){
      for(let j=0;j<smallCells.length;j++){
        if(smallCells[j].phageIdx>=0&&smallCells[j].phageIdx!==i)continue;
        const dx=smallCells[j].x-ph.x,dy=smallCells[j].y-ph.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<nearDist){nearDist=d;nearIdx=j;}
      }
    }
    if(nearIdx>=0)_usedTargets.add(nearIdx);
    ph.targetIdx=nearIdx;
    if(nearIdx>=0){
      const sc=smallCells[nearIdx];
      const dx=sc.x-ph.x,dy=sc.y-ph.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d>PHAGE_RADIUS+SMALL_CELL_R+2){ph.vx+=(dx/d)*0.2;ph.vy+=(dy/d)*0.2;}
      else if(!sc.infected){sc.infected=true;sc.phageIdx=i;sc.infTimer=INF_TIMER;}
    }
    ph.vx*=0.90;ph.vy*=0.90;ph.x+=ph.vx;ph.y+=ph.vy;
    if(ph.x<PHAGE_RADIUS){ph.x=PHAGE_RADIUS;ph.vx=Math.abs(ph.vx);}
    if(ph.x>W-PHAGE_RADIUS){ph.x=W-PHAGE_RADIUS;ph.vx=-Math.abs(ph.vx);}
    if(ph.y<PHAGE_RADIUS){ph.y=PHAGE_RADIUS;ph.vy=Math.abs(ph.vy);}
    if(ph.y>H-PHAGE_RADIUS){ph.y=H-PHAGE_RADIUS;ph.vy=-Math.abs(ph.vy);}
    const dx=ph.x-ringX,dy=ph.y-ringY;
    if(Math.sqrt(dx*dx+dy*dy)<RING_RADIUS+PHAGE_RADIUS){
      const penalty=Math.floor(intScore(score)*0.2);spendScorePoints(penalty);
      addFloatText(ringX,ringY-40,'-'+penalty+'分⚠','#ff4040',80);
      rogueScreen='runOver';saveScores();checkAchievements();return;
    }
  }
  for(let j=smallCells.length-1;j>=0;j--){
    const sc=smallCells[j];sc.wobble+=0.04;
    if(sc.infected&&sc.phageIdx>=0){
      sc.infTimer--;
      if(sc.infTimer<=0){
        phages.push({x:sc.x,y:sc.y,vx:(Math.random()-0.5)*1.5,vy:(Math.random()-0.5)*1.5,targetIdx:-1,angle:Math.random()*Math.PI*2});
        smallCells.splice(j,1);
        for(const s of smallCells)if(s.phageIdx>j)s.phageIdx--;
        continue;
      }
    }
    const dx=sc.x-ringX,dy=sc.y-ringY;
    if(Math.sqrt(dx*dx+dy*dy)<RING_RADIUS+SMALL_CELL_R){
      let pts=30;
      if(sc.infected){
        pts=300;
        addFloatText(sc.x,sc.y,'拦截！+'+pts,CELL_C.glow);
        const pi=sc.phageIdx;
        if(pi>=0&&pi<phages.length){phages.splice(pi,1);for(const s of smallCells)if(s.phageIdx>pi)s.phageIdx--;}
      }else{addFloatText(sc.x,sc.y,'+'+pts,CELL_C.glow);}
      addScorePoints(pts);
      smallCells.splice(j,1);
    }
  }
}
function drawPhages(){
  if(score<PHAGE_TRIGGER_SCORE)return;
  for(const sc of smallCells){
    ctx.save();ctx.translate(sc.x,sc.y);
    ctx.beginPath();
    for(let i=0;i<10;i++){const a=i*Math.PI*0.2,w=SMALL_CELL_R*(0.82+0.18*Math.sin(i*2.3+sc.wobble));if(i===0)ctx.moveTo(Math.cos(a)*w,Math.sin(a)*w);else ctx.lineTo(Math.cos(a)*w,Math.sin(a)*w);}
    ctx.closePath();
    ctx.fillStyle=sc.infected?'rgba(200,70,70,0.85)':'rgba(50,180,80,0.82)';
    ctx.strokeStyle=sc.infected?'#ff4040':CELL_C.glow;ctx.lineWidth=1.5;ctx.fill();ctx.stroke();

    ctx.restore();
  }
  if(phages.length>0){
    const nearest=phages.reduce((mn,ph)=>Math.min(mn,Math.sqrt((ph.x-ringX)**2+(ph.y-ringY)**2)),Infinity);

}

function rr(x,y,w,h,r){
  r=Math.max(0,Math.min(r,Math.abs(w)/2,Math.abs(h)/2));
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}

function drawMagneticField_western(alphaOverride){

function drawMagneticLines_western(){

    if(i2>=maxL2)break;
    const dx=ringX-p.x,dy=ringY-p.y,d=Math.sqrt(dx*dx+dy*dy);
    if(d>RING_RADIUS&&d<effOuter){
      const t=(effOuter-d)/(effOuter-RING_RADIUS),a=t*0.42,nx=dx/d,ny=dy/d;
      const sx=ringX-nx*RING_RADIUS,sy=ringY-ny*RING_RADIUS;
      const cpx=(p.x+sx)/2-ny*t*25,cpy=(p.y+sy)/2+nx*t*25;
      ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.quadraticCurveTo(cpx,cpy,sx,sy);
      ctx.strokeStyle=hexToRgba(CARTOON_STYLE.blue,a);ctx.lineWidth=1;ctx.setLineDash([3,8]);ctx.lineDashOffset=-frame*2;ctx.stroke();ctx.setLineDash([]);

    }
  }

function getWorldSettlementRows(){

    normalized.world=true;
    return normalized;
  });
  const currentScore=intScore(score);
  if(mode==='endless'&&currentScore>0){
    const pn=(getPlayerName()||'本局玩家').slice(0,12);
    const sameIndex=rows.findIndex(function(e){return pn&&e.name===pn;});
    const same=sameIndex>=0?rows[sameIndex]:null;
    if(same&&currentScore>intScore(same.score))rows.splice(sameIndex,1);

}

function getSettlementRect(){
  const margin=Math.max(10,Math.min(26,W*0.025));
  let h=Math.min(H-margin*2,H*0.92);
  let w=h*9/16;
  if(w>W-margin*2){w=W-margin*2;h=w*16/9;}
  return {x:W/2-w/2,y:H/2-h/2,w:w,h:h};
}
function drawPaintText(text,x,y,size,opts){
  opts=opts||{};
  const fill=opts.fill||'#edf5ff',stroke=opts.stroke||'#11172c';
  const font='"Courier New","Lucida Console","Consolas",monospace';
  let fs=size;
  ctx.save();
  ctx.textAlign=opts.align||'center';
  ctx.textBaseline='middle';
  ctx.lineJoin='round';
  while(opts.maxWidth&&fs>9){
    ctx.font='900 '+fs+'px '+font;
    if(ctx.measureText(text).width<=opts.maxWidth)break;
    fs-=1;
  }
  ctx.font='900 '+fs+'px '+font;
  ctx.shadowColor='rgba(90,140,255,0.45)';
  ctx.shadowBlur=Math.max(5,fs*0.18);
  ctx.strokeStyle=stroke;
  ctx.lineWidth=opts.lineWidth||Math.max(3,fs*0.14);
  ctx.strokeText(text,x,y);
  ctx.fillStyle=fill;
  ctx.fillText(text,x,y);
  if(opts.paint){
    const tw=Math.min(ctx.measureText(text).width,opts.maxWidth||9999);
    ctx.shadowColor='transparent';
    ctx.globalAlpha=0.65;
    ctx.strokeStyle='rgba(180,220,255,0.8)';
    ctx.lineWidth=Math.max(1,fs*0.04);
    ctx.beginPath();
    ctx.moveTo(x-tw*0.35,y-fs*0.24);ctx.lineTo(x-tw*0.14,y-fs*0.32);
    ctx.moveTo(x+tw*0.05,y-fs*0.27);ctx.lineTo(x+tw*0.30,y-fs*0.16);
    ctx.stroke();
  }
  ctx.restore();
  drawThemeTransitionOverlay();
}

function loop_western(ts){
  try{
  if(ts===undefined)ts=performance.now();
  if(!_lastUpdate){_lastUpdate=ts;update();render();requestAnimationFrame(loop_western);return;}
  var dt=Math.min(ts-_lastUpdate,100);
  if(dt<=0){requestAnimationFrame(loop_western);return;}
  _lastUpdate=ts;_acc+=dt;
  var updates=0;
  while(_acc>=_FIXED_DT&&updates<_MAX_UPDATES){update();_acc-=_FIXED_DT;updates++;}
  if(_acc>_FIXED_DT*_MAX_UPDATES)_acc=0;
  render();
  }catch(e){console.warn('loop_western error:',e);_lastUpdate=0;_acc=0;}
  requestAnimationFrame(loop_western);
}

function restoreSpaceTheme(){
  var fk=Object.keys(_spaceFns);
  for(var i=0;i<fk.length;i++){eval(fk[i]+'=_spaceFns[fk[i]]');}
  for(var i=0;i<COLORS.length;i++)COLORS[i]=_spacePalette.colors[i];
  for(var i=0;i<PLANET_STYLES.length;i++){var src=_spacePalette.styles[i],dst=PLANET_STYLES[i];for(var k in src)dst[k]=src[k];}

  document.body.style.background=_spacePalette.bg;
